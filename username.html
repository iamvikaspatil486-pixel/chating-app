<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Username</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white flex items-center justify-center h-screen">

<div class="bg-slate-800 p-6 rounded-xl w-80">

<h2 class="text-xl mb-4 text-center">Set Your Temporary Username</h2>

<div class="flex flex-wrap gap-2 mb-4">

<button class="badge bg-slate-700 px-3 py-1 rounded" onclick="selectName('peace_destroyer')">peace_destroyer</button>

<button class="badge bg-slate-700 px-3 py-1 rounded" onclick="selectName('batman')">batman</button>

<button class="badge bg-slate-700 px-3 py-1 rounded" onclick="selectName('caffeine_demon')">caffeine_demon</button>

<button class="badge bg-slate-700 px-3 py-1 rounded" onclick="selectName('night_coder')">night_coder</button>

</div>

<input id="custom-name"
placeholder="Create your own username"
class="w-full p-2 rounded text-black">

<button id="enterBtn"
class="mt-4 w-full bg-indigo-500 p-2 rounded">

Enter Chat

</button>

<p id="msg" class="text-red-400 mt-2"></p>

</div>

<script src="username.js"></script>

</body>
</html>

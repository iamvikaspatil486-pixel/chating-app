<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STUDENTS HARATE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

/* App container */

.container{
width:100%;
max-width:380px;
background:white;
padding:40px 25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

/* App name */

.app-title{
font-size:28px;
font-weight:bold;
color:#4f46e5;
margin-bottom:10px;
}

/* subtitle */

.tagline{
font-size:14px;
color:#555;
margin-bottom:35px;
}

/* buttons */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-bottom:15px;
}

/* login */

.login-btn{
background:#4f46e5;
color:white;
}

.login-btn:hover{
background:#3730a3;
}

/* register */

.register-btn{
background:#9333ea;
color:white;
}

.register-btn:hover{
background:#7e22ce;
}

/* footer */

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}

</style>

</head>


<body>

<div class="container">

<div class="app-title">STUDENTS HARATE</div>

<div class="tagline">
A private chat space for students
</div>

<button class="btn login-btn"
onclick="location.href='login.html'">
Login
</button>

<button class="btn register-btn"
onclick="location.href='register.html'">
Register
</button>

<div class="footer">
Only approved students can join
</div>

</div>

</body>

</html>

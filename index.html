<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDENTS HARATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: pan-x pan-y;
            overscroll-behavior: none;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans flex flex-col h-screen overflow-hidden">

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                STUDENTS HARATE
            </h1>
            <p class="text-slate-400 text-lg">Where college conversations happen.</p>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <button onclick="location.href='/login.html'" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Login
            </button>
            <button onclick="location.href='/register.html'" class="w-full py-4 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-2xl font-bold text-lg transition-all active:scale-95">
                Join Now
            </button>
        </div>
    </main>

    <footer class="pb-10 text-slate-500 text-sm">
        &copy; 2026 Students Harate
    </footer>

</body>
</html>

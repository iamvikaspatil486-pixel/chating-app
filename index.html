<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>STUDENTS HARATE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* Stop page movement */

html,body{
height:100%;
overflow:hidden;
}

/* background */

body{
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

/* app card */

.container{

width:100%;
max-width:380px;
height:90vh;

background:white;

border-radius:25px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:30px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

/* title */

.title{
font-size:28px;
font-weight:bold;
color:#4f46e5;
margin-bottom:10px;
}

/* subtitle */

.subtitle{
font-size:14px;
color:#666;
margin-bottom:40px;
text-align:center;
}

/* buttons */

.btn{

width:100%;
padding:15px;

border:none;
border-radius:12px;

font-size:16px;
font-weight:bold;

cursor:pointer;

margin-bottom:15px;

transition:0.3s;

}

/* login */

.login{
background:#4f46e5;
color:white;
}

.login:active{
background:#3730a3;
}

/* register */

.register{
background:#9333ea;
color:white;
}

.register:active{
background:#7e22ce;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
STUDENTS HARATE
</div>

<div class="subtitle">
Private chat for college students
</div>

<button class="btn login"
onclick="location.href='login.html'">
Login
</button>

<button class="btn register"
onclick="location.href='register.html'">
Register
</button>

<div class="footer">
Only approved students can join
</div>

</div>

</body>

</html>

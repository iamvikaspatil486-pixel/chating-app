<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Students Harate</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Theme color for mobile -->
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen px-6 overflow-hidden">

<div class="w-full max-w-sm text-center">

<h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-3">
STUDENTS<br>HARATE
</h1>

<p class="text-slate-400 mb-10">
Where college conversations happen.
</p>

<!-- LOGIN BUTTON -->
<button
onclick="openLogin()"
class="w-full py-4 rounded-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg mb-4">
Login
</button>

<!-- REGISTER BUTTON -->
<button
onclick="openRegister()"
class="w-full py-4 rounded-2xl font-bold bg-slate-800 border border-slate-700 hover:bg-slate-700">
Join Now
</button>

<p class="text-slate-500 text-xs mt-14">
© 2026 Students Harate
</p>

</div>

<script>

// redirect if already logged in
async function checkLoggedUser(){

const { data } = await db.auth.getSession();

if(data.session){
window.location.href = "home.html";
}

}

window.addEventListener("load", checkLoggedUser);

function openLogin(){
window.location.href="login.html";
}

function openRegister(){
window.location.href="register.html";
}

</script>
<div id="dev-panel">

<div id="dev-header">DEV PANEL</div>

<div id="dev-console"></div>

<input id="dev-input" placeholder="Run JS code...">

<button id="dev-run">Run</button>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<title>college chat app</title>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

<h1 class="title">college chat app</h1>
<p class="subtitle">Connect with your classmates</p>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="roll" placeholder="Roll Number">

<input type="text" id="nickname" placeholder="Nickname (optional)">

<input type="email" id="email" placeholder="College Email">

<button class="verify">Verify Email</button>

<button class="login">Submit for Approval</button>

<p class="note">Admin approval required before entering the app</p>

</div>

</body>
</html>

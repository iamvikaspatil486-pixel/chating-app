<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RPS · AGASTYANS</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060610;
    --surface: #0e0e1f;
    --card: #141428;
    --border: #1e1e3a;
    --cyan: #00e5ff;
    --purple: #7c3aed;
    --pink: #f472b6;
    --green: #00ff88;
    --red: #ff4444;
    --yellow: #ffd700;
    --text: #f0f0ff;
    --muted: #5a5a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(0,229,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,6,16,0.9);
    backdrop-filter: blur(10px);
  }

  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .header-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .score-display {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
  }

  .score-you { color: var(--green); }
  .score-sep { color: var(--muted); }
  .score-ai  { color: var(--red); }

  /* MAIN */
  .main {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* CAMERA SECTION */
  .camera-section {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.85;
  }

  #canvasEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* Camera overlay gradient */
  .camera-section::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(6,6,16,0.3) 0%,
      transparent 30%,
      transparent 60%,
      rgba(6,6,16,0.8) 100%);
    pointer-events: none;
  }

  /* GESTURE INDICATOR */
  .gesture-indicator {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(6,6,16,0.85);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--cyan);
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .gesture-indicator.detected {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }

  /* BOTTOM GAME UI */
  .game-ui {
    position: relative;
    z-index: 20;
    background: rgba(6,6,16,0.95);
    border-top: 1px solid var(--border);
    padding: 14px 16px 20px;
    backdrop-filter: blur(20px);
  }

  /* BATTLE DISPLAY */
  .battle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }

  .fighter {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .fighter-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .fighter-gesture {
    font-size: 44px;
    line-height: 1;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 10px rgba(0,229,255,0.3));
  }

  .fighter-gesture.bounce {
    animation: bounceGesture 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes bounceGesture {
    0% { transform: scale(0.5); }
    100% { transform: scale(1); }
  }

  .vs-badge {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--border);
    letter-spacing: 2px;
  }

  /* RESULT */
  .result-text {
    text-align: center;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    margin-bottom: 12px;
    min-height: 36px;
    transition: all 0.3s;
  }

  .result-text.win  { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.5); }
  .result-text.lose { color: var(--red);   text-shadow: 0 0 20px rgba(255,68,68,0.5); }
  .result-text.draw { color: var(--yellow); text-shadow: 0 0 20px rgba(255,215,0,0.4); }

  /* PLAY BUTTON */
  .play-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  }

  .play-btn:active { transform: scale(0.97); }
  .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  }

  /* COUNTDOWN */
  .countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 80px;
    color: white;
    text-shadow: 0 0 40px rgba(0,229,255,0.8);
    z-index: 30;
    background: rgba(6,6,16,0.6);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .countdown.visible { opacity: 1; pointer-events: auto; }

  .countdown-num {
    animation: countPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes countPop {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* START SCREEN */
  .start-screen {
    position: absolute;
    inset: 0;
    z-index: 25;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(6,6,16,0.92);
    backdrop-filter: blur(10px);
  }

  .start-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .gestures-guide {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  .guide-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .guide-emoji { font-size: 32px; }
  .guide-label { font-weight: 700; color: var(--text); font-size: 12px; }

  .start-btn {
    margin-top: 8px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 30px;
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(0,229,255,0.4);
    transition: transform 0.15s;
  }
  .start-btn:active { transform: scale(0.95); }

  .hint-text {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 0 20px;
    line-height: 1.6;
  }

  /* LOADING */
  .loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* STREAK */
  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--yellow);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    text-align: center;
    width: 100%;
    justify-content: center;
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="header-title">RPS BATTLE</div>
  <div class="score-display">
    <span class="score-you" id="scoreYou">0</span>
    <span class="score-sep">:</span>
    <span class="score-ai" id="scoreAi">0</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LOADING -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING AI...</div>
  </div>

  <!-- CAMERA -->
  <div class="camera-section">
    <video id="videoEl" playsinline autoplay muted></video>
    <canvas id="canvasEl"></canvas>

    <div class="gesture-indicator" id="gestureIndicator">SHOW YOUR HAND</div>

    <div class="countdown" id="countdown"></div>

    <!-- START SCREEN -->
    <div class="start-screen" id="startScreen">
      <div class="start-title">ROCK<br>PAPER<br>SCISSORS</div>
      <div class="gestures-guide">
        <div class="guide-item">
          <div class="guide-emoji">✊</div>
          <div class="guide-label">ROCK</div>
          <div>closed fist</div>
        </div>
        <div class="guide-item">
          <div class="guide-emoji">🖐</div>
          <div class="guide-label">PAPER</div>
          <div>open hand</div>
        </div>
        <div class="guide-item">
          <div class="guide-emoji">✌️</div>
          <div class="guide-label">SCISSORS</div>
          <div>two fingers</div>
        </div>
      </div>
      <button class="start-btn" id="startBtn">START</button>
      <div class="hint-text">Show your hand gesture to the camera when the countdown ends</div>
    </div>

  </div>

  <!-- GAME UI -->
  <div class="game-ui">

    <div class="streak-badge" id="streakBadge" style="display:none;">🔥 <span id="streakCount">0</span> WIN STREAK!</div>

    <div class="battle-row">
      <div class="fighter">
        <div class="fighter-label">YOU</div>
        <div class="fighter-gesture" id="yourGesture">🤔</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="fighter">
        <div class="fighter-label">AI</div>
        <div class="fighter-gesture" id="aiGesture">🤖</div>
      </div>
    </div>

    <div class="result-text" id="resultText"></div>

    <button class="play-btn" id="playBtn" disabled>PLAY</button>

  </div>

</div>

<script>
// ── GAME STATE ─────────────────────────────────────────────
const GESTURES = { rock: '✊', paper: '🖐', scissors: '✌️' }
const GESTURE_NAMES = ['rock', 'paper', 'scissors']
let scores = { you: 0, ai: 0 }
let streak = 0
let currentGesture = null
let isPlaying = false
let hands = null
let camera = null
let lastGestureTime = 0

// ── DOM ────────────────────────────────────────────────────
const videoEl = document.getElementById('videoEl')
const canvasEl = document.getElementById('canvasEl')
const ctx = canvasEl.getContext('2d')
const gestureIndicator = document.getElementById('gestureIndicator')
const yourGesture = document.getElementById('yourGesture')
const aiGesture = document.getElementById('aiGesture')
const resultText = document.getElementById('resultText')
const playBtn = document.getElementById('playBtn')
const startBtn = document.getElementById('startBtn')
const startScreen = document.getElementById('startScreen')
const countdown = document.getElementById('countdown')
const loadingOverlay = document.getElementById('loadingOverlay')
const streakBadge = document.getElementById('streakBadge')
const streakCount = document.getElementById('streakCount')

// ── GESTURE DETECTION ─────────────────────────────────────
function detectGesture(landmarks) {
  const fingertips = [8, 12, 16, 20]  // index, middle, ring, pinky
  const bases = [6, 10, 14, 18]

  const thumbTip = landmarks[4]
  const thumbBase = landmarks[2]
  const wrist = landmarks[0]

  // Check each finger if extended
  const fingerExtended = fingertips.map((tip, i) => {
    return landmarks[tip].y < landmarks[bases[i]].y
  })

  const extendedCount = fingerExtended.filter(Boolean).length
  const thumbExtended = thumbTip.x < thumbBase.x  // mirrored camera

  // ROCK: all fingers curled
  if (extendedCount === 0 && !thumbExtended) return 'rock'

  // SCISSORS: only index + middle extended
  if (fingerExtended[0] && fingerExtended[1] && !fingerExtended[2] && !fingerExtended[3]) return 'scissors'

  // PAPER: all fingers extended
  if (extendedCount >= 3) return 'paper'

  return null
}

// ── DRAW HAND LANDMARKS ───────────────────────────────────
function drawHand(landmarks) {
  const connections = [
    [0,1],[1,2],[2,3],[3,4],      // thumb
    [0,5],[5,6],[6,7],[7,8],      // index
    [0,9],[9,10],[10,11],[11,12], // middle
    [0,13],[13,14],[14,15],[15,16],// ring
    [0,17],[17,18],[18,19],[19,20],// pinky
    [5,9],[9,13],[13,17]          // palm
  ]

  const w = canvasEl.width
  const h = canvasEl.height

  ctx.clearRect(0, 0, w, h)

  // Draw connections
  ctx.strokeStyle = 'rgba(0,229,255,0.6)'
  ctx.lineWidth = 2
  connections.forEach(([a, b]) => {
    ctx.beginPath()
    ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h)
    ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h)
    ctx.stroke()
  })

  // Draw points
  landmarks.forEach((lm, i) => {
    ctx.beginPath()
    ctx.arc(lm.x * w, lm.y * h, i === 0 ? 5 : 3, 0, Math.PI * 2)
    ctx.fillStyle = i === 0 ? 'rgba(124,58,237,0.9)' : 'rgba(0,229,255,0.9)'
    ctx.fill()
  })
}

// ── MEDIAPIPE INIT ────────────────────────────────────────
async function initMediaPipe() {
  try {
    // Dynamically load MediaPipe
    await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js')
    await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js')

    hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    })

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    })

    hands.onResults((results) => {
      canvasEl.width = videoEl.videoWidth || canvasEl.offsetWidth
      canvasEl.height = videoEl.videoHeight || canvasEl.offsetHeight

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0]
        drawHand(landmarks)

        const gesture = detectGesture(landmarks)
        if (gesture) {
          currentGesture = gesture
          gestureIndicator.textContent = GESTURES[gesture] + ' ' + gesture.toUpperCase()
          gestureIndicator.classList.add('detected')
        } else {
          currentGesture = null
          gestureIndicator.textContent = 'SHOW YOUR HAND'
          gestureIndicator.classList.remove('detected')
        }
      } else {
        ctx.clearRect(0, 0, canvasEl.width, canvasEl.height)
        currentGesture = null
        gestureIndicator.textContent = 'SHOW YOUR HAND'
        gestureIndicator.classList.remove('detected')
      }
    })

    // Start camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    })
    videoEl.srcObject = stream

    camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }) },
      width: 640, height: 480
    })

    await camera.start()
    loadingOverlay.style.display = 'none'

  } catch (err) {
    loadingOverlay.innerHTML = `
      <div style="text-align:center;padding:20px;color:#ff4444;">
        <div style="font-size:40px;margin-bottom:12px;">📷</div>
        <div style="font-weight:700;margin-bottom:6px;">Camera access needed</div>
        <div style="font-size:12px;color:#5a5a8a;">Allow camera permission and reload</div>
        <button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#00e5ff;border:none;border-radius:10px;color:#000;font-weight:700;cursor:pointer;">Retry</button>
      </div>
    `
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[src="${src}"]`)
    if (existing) { resolve(); return }
    const s = document.createElement('script')
    s.src = src
    s.onload = resolve
    s.onerror = reject
    document.head.appendChild(s)
  })
}

// ── GAME LOGIC ─────────────────────────────────────────────
function getAIMove() {
  return GESTURE_NAMES[Math.floor(Math.random() * 3)]
}

function getResult(player, ai) {
  if (player === ai) return 'draw'
  if (
    (player === 'rock'     && ai === 'scissors') ||
    (player === 'scissors' && ai === 'paper')    ||
    (player === 'paper'    && ai === 'rock')
  ) return 'win'
  return 'lose'
}

async function startCountdown() {
  isPlaying = true
  playBtn.disabled = true
  const nums = ['3', '2', '1', 'GO!']

  for (let i = 0; i < nums.length; i++) {
    countdown.innerHTML = `<span class="countdown-num" style="color:${i===3?'#00ff88':'white'}">${nums[i]}</span>`
    countdown.classList.add('visible')
    await sleep(700)
    if (i < nums.length - 1) countdown.classList.remove('visible')
    await sleep(100)
  }

  countdown.classList.remove('visible')
  resolveRound()
}

async function resolveRound() {
  const playerMove = currentGesture

  if (!playerMove) {
    resultText.textContent = 'NO HAND DETECTED'
    resultText.className = 'result-text lose'
    isPlaying = false
    playBtn.disabled = false
    return
  }

  const aiMove = getAIMove()
  const result = getResult(playerMove, aiMove)

  // Animate gestures
  yourGesture.textContent = GESTURES[playerMove]
  yourGesture.classList.add('bounce')
  setTimeout(() => yourGesture.classList.remove('bounce'), 400)

  // AI "thinking" animation
  let ticks = 0
  const thinkInterval = setInterval(() => {
    aiGesture.textContent = GESTURES[GESTURE_NAMES[ticks % 3]]
    ticks++
  }, 120)

  await sleep(600)
  clearInterval(thinkInterval)
  aiGesture.textContent = GESTURES[aiMove]
  aiGesture.classList.add('bounce')
  setTimeout(() => aiGesture.classList.remove('bounce'), 400)

  await sleep(200)

  // Show result
  if (result === 'win') {
    resultText.textContent = 'YOU WIN! 🎉'
    resultText.className = 'result-text win'
    scores.you++
    streak++
    if (streak >= 2) {
      streakBadge.style.display = 'flex'
      streakCount.textContent = streak
    }
    confetti()
  } else if (result === 'lose') {
    resultText.textContent = 'AI WINS 😈'
    resultText.className = 'result-text lose'
    scores.ai++
    streak = 0
    streakBadge.style.display = 'none'
  } else {
    resultText.textContent = "IT'S A DRAW 🤝"
    resultText.className = 'result-text draw'
    streak = 0
    streakBadge.style.display = 'none'
  }

  document.getElementById('scoreYou').textContent = scores.you
  document.getElementById('scoreAi').textContent = scores.ai

  isPlaying = false
  playBtn.disabled = false
}

// ── CONFETTI ───────────────────────────────────────────────
function confetti() {
  const colors = ['#00e5ff', '#7c3aed', '#f472b6', '#00ff88', '#ffd700']
  for (let i = 0; i < 25; i++) {
    setTimeout(() => {
      const piece = document.createElement('div')
      piece.className = 'confetti-piece'
      piece.style.left = Math.random() * 100 + 'vw'
      piece.style.background = colors[Math.floor(Math.random() * colors.length)]
      piece.style.animationDuration = (Math.random() * 1.5 + 1) + 's'
      piece.style.width = piece.style.height = (Math.random() * 8 + 4) + 'px'
      document.body.appendChild(piece)
      setTimeout(() => piece.remove(), 2500)
    }, i * 60)
  }
}

// ── UTILS ──────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)) }

// ── EVENTS ─────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startScreen.style.display = 'none'
  playBtn.disabled = false
})

playBtn.addEventListener('click', () => {
  if (!isPlaying) startCountdown()
})

// ── INIT ───────────────────────────────────────────────────
initMediaPipe()
</script>
</body>
</html>

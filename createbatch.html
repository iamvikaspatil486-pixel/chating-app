<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Create Your Batch - Students Harate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="supabase.js"></script>
  <style>
    .hidden { display: none; }
    .active { display: block; }
    #step1 { display: block; }
    #step2 { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-white">

<div class="min-h-screen flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">

    <div id="step1" class="space-y-6">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
          Create Your Batch
        </h1>
        <p class="text-slate-400 text-sm">Step 1: Your Information</p>
      </div>

      <form id="personalDetailsForm" class="space-y-4">
        <input id="fullName" type="text" placeholder="Full Name" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400" required />

        <div>
          <input id="rollNo" type="text" placeholder="Roll Number" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400" required />
          <p class="text-xs text-slate-500 mt-1 ml-1">You can update your roll number later.</p>
        </div>

        <input id="email" type="email" placeholder="College Email" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400" required />

        <button type="submit" id="sendLinkBtn" class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg transition">
          Send Magic Link
        </button>

        <div id="step1-error" class="hidden px-4 py-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>

        <div id="checkEmailMsg" class="hidden text-center p-6 bg-slate-800/50 border border-slate-700 rounded-xl space-y-3">
          <div class="text-cyan-400 flex justify-center"><i data-lucide="mail" size="40"></i></div>
          <h3 class="font-bold">Check your inbox!</h3>
          <p class="text-sm text-slate-400">Click the link in your email. Once verified, this page will update automatically.</p>
        </div>
      </form>
    </div>

    <div id="step2" class="space-y-6">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">Batch Setup</h1>
        <p class="text-slate-400 text-sm" id="welcomeBackMsg">Step 2: Security & Batch Info</p>
      </div>

      <form id="batchDetailsForm" class="space-y-4">
        <input id="collegeName" type="text" placeholder="College Name" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400" required />
        <input id="batchName" type="text" placeholder="Batch Name (e.g., CSE 2024)" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400" required />

        <div class="relative">
          <input id="password" type="password" placeholder="Set Password" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400 pr-12" required />
          <button type="button" onclick="togglePassword('password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"><i id="password-icon" data-lucide="eye"></i></button>
        </div>

        <div class="relative">
          <input id="confirmPassword" type="password" placeholder="Confirm Password" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-400 pr-12" required />
          <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"><i id="confirmPassword-icon" data-lucide="eye"></i></button>
        </div>

        <button type="submit" id="createBatchBtn" class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg">Complete Registration</button>
        <div id="step2-error" class="hidden px-4 py-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
      </form>
    </div>

    <div id="step3" class="hidden text-center space-y-6">
      <div class="text-5xl">🎉</div>
      <h2 class="text-2xl font-bold text-cyan-400">Batch Created!</h2>
      <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 space-y-3">
        <p class="text-slate-400 text-sm text-center">Batch Code:</p>
        <p class="text-4xl font-mono font-bold text-white tracking-widest text-center" id="batchCodeDisplay"></p>
        <button onclick="copyBatchCode()" id="copyBtn" class="w-full py-2 text-sm bg-cyan-500/10 text-cyan-400 rounded-lg border border-cyan-500/20 hover:bg-cyan-500/20 transition">Copy Code</button>
      </div>
      <button onclick="goHome()" class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900">Go Home</button>
    </div>

  </div>
</div>

<script>
// --- GLOBAL STATE ---
let userData = JSON.parse(localStorage.getItem('pendingUser')) || null;

window.addEventListener('load', async () => {
  lucide.createIcons();
  checkSession();
});

// Continuously check for session in case they verify in another tab
const sessionInterval = setInterval(async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session && userData) {
        showStep2(session.user.email);
        clearInterval(sessionInterval);
    }
}, 3000);

async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session && userData) {
    showStep2(session.user.email);
  }
}

function showStep2(email) {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.add("active");
    document.getElementById("welcomeBackMsg").innerText = `Email verified: ${email}. Complete your batch setup below.`;
}

function togglePassword(id) {
  const input = document.getElementById(id);
  const icon = document.getElementById(id + "-icon");
  const isPass = input.type === "password";
  input.type = isPass ? "text" : "password";
  icon.setAttribute("data-lucide", isPass ? "eye-off" : "eye");
  lucide.createIcons();
}

// --- STEP 1: SEND MAGIC LINK ---
document.getElementById("personalDetailsForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorDiv = document.getElementById("step1-error");
  const btn = document.getElementById("sendLinkBtn");
  
  const name = document.getElementById("fullName").value.trim();
  const rollNo = document.getElementById("rollNo").value.trim();
  const email = document.getElementById("email").value.trim();

  errorDiv.classList.add("hidden");
  btn.innerText = "Sending Link...";
  btn.disabled = true;

  try {
    // Store user data so we remember them when they come back
    userData = { name, rollNo, email };
    localStorage.setItem('pendingUser', JSON.stringify(userData));

    const { error } = await db.auth.signInWithOtp({ 
      email: email,
      options: {
        // Change this to your verify.html path
        emailRedirectTo: window.location.origin + '/verify.html' 
      }
    });
    
    if (error) throw error;

    btn.classList.add("hidden");
    document.getElementById("checkEmailMsg").classList.remove("hidden");
  } catch (err) {
    errorDiv.textContent = err.message;
    errorDiv.classList.remove("hidden");
    btn.disabled = false;
    btn.innerText = "Send Magic Link";
  }
});

// --- STEP 2: COMPLETE REGISTRATION ---
document.getElementById("batchDetailsForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pass = document.getElementById("password").value;
  const conf = document.getElementById("confirmPassword").value;
  const errorDiv = document.getElementById("step2-error");

  if (pass !== conf) {
    errorDiv.textContent = "Passwords do not match";
    errorDiv.classList.remove("hidden");
    return;
  }

  const btn = document.getElementById("createBatchBtn");
  btn.innerText = "Saving...";
  btn.disabled = true;

  try {
    const { data: { user } } = await db.auth.getUser();
    if (!user) throw new Error("Session not found. Try refreshing.");

    // Update password
    const { error: passError } = await db.auth.updateUser({ password: pass });
    if (passError) throw passError;

    const batchCode = Math.random().toString(36).substring(2, 8).toUpperCase();

    // profile
    await db.from("students").insert([{
      id: user.id,
      full_name: userData.name,
      roll_no: userData.rollNo,
      email: user.email,
      is_approved: true 
    }]);

    // batch
    await db.from("batches").insert([{
      batch_name: document.getElementById("batchName").value,
      college_name: document.getElementById("collegeName").value,
      batch_code: batchCode,
      created_by: user.id
    }]);

    localStorage.removeItem('pendingUser');
    document.getElementById("step2").classList.remove("active");
    document.getElementById("step3").classList.remove("hidden");
    document.getElementById("batchCodeDisplay").innerText = batchCode;

  } catch (err) {
    errorDiv.textContent = err.message;
    errorDiv.classList.remove("hidden");
    btn.disabled = false;
    btn.innerText = "Complete Registration";
  }
});

function copyBatchCode() {
  const code = document.getElementById("batchCodeDisplay").innerText;
  navigator.clipboard.writeText(code);
  document.getElementById("copyBtn").innerText = "Copied!";
}

function goHome() { window.location.href = "home.html"; }
</script>
</body>
</html>

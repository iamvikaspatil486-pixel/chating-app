<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Create Your Batch - Students Harate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    .hidden { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-white">

<!-- ── CONTAINER ── -->
<div class="min-h-screen flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">

    <!-- ── STEP 1: REGISTER ── -->
    <div id="step1" class="space-y-6">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
          Create Your Batch
        </h1>
        <p class="text-slate-400 text-sm">Step 1: Register</p>
      </div>

      <div class="space-y-4">
        <input
          id="fullName"
          type="text"
          placeholder="Full Name"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400"
        />
        <input
          id="rollNo"
          type="text"
          placeholder="Roll Number"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400"
        />
        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400"
        />
        <input
          id="password"
          type="password"
          placeholder="Password"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400"
        />
      </div>

      <button
        onclick="registerAndNext()"
        class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg hover:shadow-xl transition">
        Next: Create Batch
      </button>

      <p class="text-slate-400 text-xs text-center">
        Already have an account? <a href="login.html" class="text-cyan-400 hover:text-cyan-300">Login</a>
      </p>

      <div id="step1-error" class="hidden px-4 py-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
    </div>

    <!-- ── STEP 2: CREATE BATCH ── -->
    <div id="step2" class="hidden space-y-6">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
          Create Your Batch
        </h1>
        <p class="text-slate-400 text-sm">Step 2: Batch Details</p>
      </div>

      <div class="space-y-4">
        <input
          id="batchName"
          type="text"
          placeholder="Batch Name (e.g., CSE 2024)"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400"
        />
        <textarea
          id="batchDescription"
          placeholder="Batch Description (optional)"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 resize-none h-24"
        ></textarea>
      </div>

      <button
        onclick="createBatch()"
        class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg hover:shadow-xl transition">
        Create Batch
      </button>

      <div id="step2-error" class="hidden px-4 py-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm"></div>
    </div>

    <!-- ── STEP 3: SUCCESS ── -->
    <div id="step3" class="hidden text-center space-y-6">
      <div class="text-5xl">✅</div>
      <h2 class="text-2xl font-bold">Batch Created!</h2>
      <p class="text-slate-400">Your batch is ready. You can now invite students to join.</p>

      <button
        onclick="goHome()"
        class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-900 shadow-lg hover:shadow-xl transition">
        Go to Home
      </button>
    </div>

  </div>
</div>

<script>

// ── Check if already logged in ──
window.addEventListener('load', async () => {
  const { data } = await db.auth.getSession();
  if (data.session) {
    window.location.href = 'home.html';
  }
});

async function registerAndNext() {
  const fullName = document.getElementById('fullName').value.trim();
  const rollNo = document.getElementById('rollNo').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorDiv = document.getElementById('step1-error');

  errorDiv.classList.add('hidden');

  // Validate
  if (!fullName || !rollNo || !email || !password) {
    errorDiv.textContent = 'All fields are required';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    // Sign up user
    const { data, error } = await db.auth.signUp({
      email,
      password,
    });

    if (error) throw new Error(error.message);

    const userId = data.user.id;

    // Insert into students table
    const { error: insertError } = await db
      .from('students')
      .insert({
        id: userId,
        full_name: fullName,
        roll_no: rollNo,
        is_approved: 'true', // Auto-approve since they're creating their batch
      });

    if (insertError) throw new Error(insertError.message);

    // Move to step 2
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');

  } catch (err) {
    errorDiv.textContent = err.message || 'Registration failed';
    errorDiv.classList.remove('hidden');
  }
}

async function createBatch() {
  const batchName = document.getElementById('batchName').value.trim();
  const batchDescription = document.getElementById('batchDescription').value.trim();
  const errorDiv = document.getElementById('step2-error');

  errorDiv.classList.add('hidden');

  if (!batchName) {
    errorDiv.textContent = 'Batch name is required';
    errorDiv.classList.remove('hidden');
    return;
  }

  try {
    const { data: sessionData } = await db.auth.getSession();
    if (!sessionData.session) throw new Error('Not authenticated');

    const userId = sessionData.session.user.id;

    // Create batch
    const { error } = await db
      .from('batches')
      .insert({
        batch_name: batchName,
        created_by: userId,
        description: batchDescription || null,
      });

    if (error) throw new Error(error.message);

    // Show success
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');

  } catch (err) {
    errorDiv.textContent = err.message || 'Failed to create batch';
    errorDiv.classList.remove('hidden');
  }
}

function goHome() {
  window.location.href = 'home.html';
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center h-screen text-white">

<div class="bg-slate-800 p-8 rounded-2xl w-80">

<h2 class="text-2xl font-bold mb-6 text-center">Set New Password</h2>

<input 
id="newPassword"
type="password"
placeholder="New Password"
class="w-full p-3 rounded bg-slate-700 mb-4"
>

<button 
onclick="updatePassword()"
class="w-full bg-cyan-600 p-3 rounded font-bold">
Update Password
</button>

</div>

<script>

async function updatePassword(){

const newPass=document.getElementById("newPassword").value;

if(newPass.length < 6){
alert("Password must be at least 6 characters");
return;
}

const {error}=await db.auth.updateUser({
password:newPass
});

if(error){
alert(error.message);
}else{
alert("Password updated successfully");
window.location.href="login.html";
}

}

</script>

</body>
</html>

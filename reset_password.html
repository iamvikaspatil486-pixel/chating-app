<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-2xl">

<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-8 text-center">
Reset Password
</h2>

<!-- New Password -->
<div class="relative mb-4">
<input type="password" id="newPassword" placeholder="New Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">

<button onclick="togglePass('newPassword')" 
class="absolute right-4 top-3.5 text-slate-400">
<i id="newPassword-icon" data-lucide="eye"></i>
</button>
</div>

<!-- Confirm Password -->
<div class="relative mb-6">
<input type="password" id="confirmPassword" placeholder="Confirm Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">

<button onclick="togglePass('confirmPassword')" 
class="absolute right-4 top-3.5 text-slate-400">
<i id="confirmPassword-icon" data-lucide="eye"></i>
</button>
</div>

<!-- Reset Button -->
<button onclick="updatePassword()" 
class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold hover:opacity-90 transition">
Reset Password
</button>

<!-- Success Message -->
<p id="successMsg" class="text-green-400 text-center mt-4 hidden">
Your new password has been successfully updated ✅
</p>

</div>

<script>

lucide.createIcons()

function togglePass(id){

const input = document.getElementById(id)
const icon = document.getElementById(id+"-icon")

if(input.type === "password"){
input.type = "text"
icon.setAttribute("data-lucide","eye-off")
}else{
input.type = "password"
icon.setAttribute("data-lucide","eye")
}

lucide.createIcons()

}

async function updatePassword(){

const newPass = document.getElementById("newPassword").value
const confirmPass = document.getElementById("confirmPassword").value

if(newPass !== confirmPass){
alert("Passwords do not match")
return
}

if(newPass.length < 6){
alert("Password must be at least 6 characters")
return
}

const { data, error } = await supabase.auth.updateUser({
password: newPass
})

if(error){
alert("Error updating password")
console.log(error)
}else{
document.getElementById("successMsg").classList.remove("hidden")
}

}

</script>

</body>
</html>

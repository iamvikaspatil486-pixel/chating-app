<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<!-- 🔥 IMPORTANT FIX -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="chat.js"></script>

<style>

*{
box-sizing:border-box;
}

html, body{
margin:0;
height:100dvh;
display:flex;
flex-direction:column;
background:#0f172a;
font-family:sans-serif;
overflow:hidden;
}

/* header */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
color:white;
border-bottom:1px solid #1e293b;
}

/* messages */

.messages{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:0;
color:white;
scroll-behavior:smooth;
}

/* bottom chat */

.bottom-chat{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
border-top:1px solid #1e293b;
padding:8px;
padding-bottom:calc(8px + env(safe-area-inset-bottom));
}

/* icons row */

.action-row{
display:flex;
gap:14px;
margin-bottom:6px;
}

/* message input */

.msg-row{
display:flex;
align-items:center;
}

.msg-input{
flex:1;
min-width:0;
background:#1e293b;
border:none;
border-radius:25px;
padding:10px 14px;
color:white;
outline:none;
}

/* icons */

.icon{
font-size:22px;
color:white;
}

/* send button */

.send-btn{
display:none;
font-size:22px;
color:#3b82f6;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<button onclick="history.back()">←</button>

<h2 class="font-bold">AGASTYANS</h2>

<div id="onlineCount"></div>

<button class="text-red-400">Logout</button>

</div>


<!-- MESSAGES -->

<div class="messages"></div>


<!-- BOTTOM CHAT -->

<div class="bottom-chat">

<!-- ICON ROW -->

<div class="action-row">

<label class="icon">
🖼
<input type="file" hidden accept="image/*">
</label>

<button class="icon">🎤</button>

<!-- 🔥 NEW GIF BUTTON -->
<button id="gifBtn" class="icon">GIF</button>

<button id="sendBtn" class="send-btn">➤</button>

</div>

<!-- MESSAGE INPUT -->

<div class="msg-row">

<input
id="msgInput"
type="text"
placeholder="Message..."
class="msg-input"
/>

</div>

</div>

</body>
</html>

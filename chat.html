<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0,
maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:url("chat-bg.jpg") center/cover no-repeat;
}

.chat-wrapper{
height:100vh;
display:flex;
flex-direction:column;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.input-bar{
padding:10px;
border-top:1px solid #333;
background:rgba(0,0,0,0.7);
}

.msg-input{
background:#1f2937;
}

</style>

</head>

<body>

<div class="chat-wrapper">

<!-- TOP BAR -->

<div class="flex items-center justify-between
px-4 py-3 border-b border-gray-700">

<button class="text-white text-xl">
←
</button>

<h1 class="text-white font-bold text-lg">
AGASTYANS
</h1>

<button class="text-red-400 text-sm">
Logout
</button>

</div>


<!-- MESSAGES AREA -->

<div class="messages">

<!-- received -->

<div class="mb-3">

<div class="inline-block
bg-gray-700 text-white
px-4 py-2 rounded-2xl">

Hello 👋

</div>

</div>

<!-- sent -->

<div class="mb-3 text-right">

<div class="inline-block
bg-blue-500 text-white
px-4 py-2 rounded-2xl">

Hi there!

</div>

</div>

</div>


<!-  MESSAGE INPUT BAR -->
<!-- MESSAGE BAR -->

<div class="w-full px-2 py-2 border-t border-gray-800 bg-black">

<div class="flex items-center gap-2 bg-gray-900 rounded-full px-3 py-2">

<!-- Camera -->
<button class="bg-indigo-500 text-white w-9 h-9 flex items-center justify-center rounded-full text-lg">
📷
</button>

<!-- Message Input -->
<input
id="msgInput"
type="text"
placeholder="Message..."
class="flex-1 bg-transparent text-white outline-none text-sm px-2"
/>

<!-- Mic -->
<button id="micBtn" class="text-gray-300 text-xl">
🎤
</button>

<!-- Image -->
<button class="text-gray-300 text-xl">
🖼️
</button>

<!-- Sticker -->
<button class="text-gray-300 text-xl">
🧊
</button>

<!-- Plus -->
<button class="text-gray-300 text-xl">
➕
</button>

<!-- Send -->
<button id="sendBtn" class="text-blue-400 text-lg hidden">
➤
</button>

</div>

</div>


</div>

</div>

</div>

</body>

</html>

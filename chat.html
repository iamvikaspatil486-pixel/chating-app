<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>AGASTYANS</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase.js"></script><style>

html,body{
height:100%;
overflow:hidden;
touch-action:manipulation;
}

</style></head><body id="chatBody"
class="bg-slate-900 text-white flex flex-col h-screen"><!-- USERNAME POPUP --><div id="usernameModal"
class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50"><div class="bg-slate-800 p-5 rounded-lg text-center w-72"><h2 class="text-lg mb-3">
Select Temporary Username
</h2><div class="space-y-2"><button onclick="setUsername('None')" class="w-full bg-slate-700 p-2 rounded">
None
</button><button onclick="setUsername('King_of_Roaster')" class="w-full bg-slate-700 p-2 rounded">
King_of_Roaster
</button><button onclick="setUsername('F_the_MFs')" class="w-full bg-slate-700 p-2 rounded">
F_the_MFs
</button><button onclick="setUsername('Princess')" class="w-full bg-slate-700 p-2 rounded">
Princess
</button><button onclick="setUsername('Ghost')" class="w-full bg-slate-700 p-2 rounded">
Ghost
</button><button onclick="setUsername('Shadow')" class="w-full bg-slate-700 p-2 rounded">
Shadow
</button><!-- CUSTOM USERNAME --><div class="pt-2 border-t border-slate-600"><input
id="customUsername"
placeholder="Create your own username"
class="w-full bg-slate-700 p-2 rounded text-sm mb-2">

<button
onclick="setCustomUsername()"
class="w-full bg-cyan-500 p-2 rounded">

Use Custom Username

</button></div></div></div></div><!-- HEADER --><header class="flex items-center justify-between p-3 border-b border-slate-700"><button onclick="history.back()">
BACK
</button><h1 class="font-bold text-cyan-400">
AGASTYANS
</h1><button onclick="logout()" class="text-red-400">
LOGOUT
</button></header><!-- CHAT AREA --><div id="chatBox"
class="flex-1 overflow-y-auto p-3 space-y-3">
</div><!-- INPUT --><div class="border-t border-slate-700 p-2 flex gap-2"><input
id="msg"
placeholder="Message..."
class="flex-1 bg-slate-800 rounded p-2 text-sm">

<button onclick="sendMsg()">Send</button>

<button onclick="sendMedia()">📎</button>

<button onclick="recordVoice()">🎤</button>

<button onclick="openGif()">GIF</button>

<button onclick="selectWallpaper()">🖼</button>

<button onclick="createPoll()">📊</button>

</div><!-- GIF PANEL --><div id="gifPanel"
class="hidden absolute bottom-16 left-0 right-0 bg-slate-900 p-3 h-64 overflow-y-scroll"><input
id="gifSearch"
placeholder="Search GIF"
class="w-full p-2 bg-slate-800 rounded mb-2">

<div id="gifResults"
class="grid grid-cols-3 gap-2"></div></div><script src="chat.js"></script></body></html>

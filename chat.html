<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-900 text-white flex flex-col h-screen">

<!-- HEADER -->

<div class="bg-slate-800 p-3 flex justify-between items-center">

<h2 class="text-lg">Anonymous Chat</h2>

<div id="usernameDisplay" class="text-sm text-gray-300"></div>

</div>

<!-- MESSAGES -->

<div id="messages"
class="flex-1 overflow-y-auto p-4 space-y-2">

</div>

<!-- INPUT -->

<div class="p-3 bg-slate-800 flex gap-2">

<input id="messageInput"
placeholder="Type message..."
class="flex-1 p-2 rounded text-black">

<button id="sendBtn"
class="bg-indigo-500 px-4 rounded">

Send

</button>

</div>

<script src="chat.js"></script>

</body>
</html>

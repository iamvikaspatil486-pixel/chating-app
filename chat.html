<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Student Lounge</title>

<link rel="stylesheet" href="chat.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<div id="debug-console"></div>
<body>

<div id="app">

<!-- LOGIN SCREEN -->

<div id="login-screen" class="overlay">

<div class="glass-card">

<h2>Set Your Vibe</h2>

<div class="suggestions">

<span class="badge" onclick="fillName('peace_destroyer')">
peace_destroyer
</span>

<span class="badge" onclick="fillName('academic_weapon')">
academic_weapon
</span>

<span class="badge" onclick="fillName('caffeine_demon')">
caffeine_demon
</span>

</div>

<input
type="text"
id="username-input"
placeholder="Enter username..."
maxlength="15"
required>

<button id="join-btn" type="button">
Enter Chat
</button>

<p id="error-msg"></p>

</div>

</div>


<!-- CHAT SCREEN -->

<div id="chat-screen" class="hidden">

<!-- HEADER -->

<header class="chat-header">

<button class="back-btn" onclick="history.back()">
←
</button>

<div class="title-area">

<h1>AGASTYANS</h1>

<div id="display-name"></div>

<div id="online-count">
0 students online
</div>

</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</header>


<!-- MESSAGES -->

<div id="messages-container"></div>


<!-- TYPING INDICATOR -->

<div id="typing-indicator"></div>


<!-- INPUT AREA -->

<div class="input-area">

<!-- VOICE ICON -->

<button id="voice-btn" class="icon-btn">

<svg width="22" height="22" viewBox="0 0 24 24"
fill="none" stroke="white" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">

<rect x="9" y="2" width="6" height="12" rx="3"></rect>
<path d="M5 10v2a7 7 0 0 0 14 0v-2"></path>
<line x1="12" y1="19" x2="12" y2="22"></line>

</svg>

</button>


<!-- IMAGE ICON -->

<button id="image-btn" class="icon-btn">

<svg width="22" height="22" viewBox="0 0 24 24"
fill="none" stroke="white" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">

<rect x="3" y="3" width="18" height="18" rx="2"></rect>
<circle cx="8.5" cy="8.5" r="1.5"></circle>
<path d="M21 15l-5-5L5 21"></path>

</svg>

</button>

<input
type="file"
id="image-input"
accept="image/*"
hidden>


<!-- MESSAGE INPUT -->

<input
type="text"
id="msg-input"
placeholder="Type a message..."
autocomplete="off">


<!-- SEND BUTTON -->

<button id="send-btn" type="button">

<svg width="22" height="22" viewBox="0 0 24 24"
fill="none" stroke="#00f2fe" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">

<line x1="22" y1="2" x2="11" y2="13"></line>
<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>

</svg>

</button>

</div>


<!-- FLOATING POLL BUTTON -->

<button id="poll-btn" class="poll-floating">
Poll
</button>


<!-- POLL CREATOR -->

<div id="poll-creator" class="overlay hidden">

<div class="poll-box">

<h3>Create Poll</h3>

<input
type="text"
id="poll-question"
placeholder="Ask a question">

<input
type="text"
class="poll-option"
placeholder="Option 1">

<input
type="text"
class="poll-option"
placeholder="Option 2">

<input
type="text"
class="poll-option"
placeholder="Option 3">

<input
type="text"
class="poll-option"
placeholder="Option 4">

<div class="poll-actions">

<button id="create-poll">
Create
</button>

<button id="cancel-poll">
Cancel
</button>

</div>

</div>

</div>

</div>

</div>


<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>

</body>
</html>

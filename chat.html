<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#0f172a;
font-family:sans-serif;
overflow:hidden;
}

/* header */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
color:white;
border-bottom:1px solid #1e293b;
}

/* messages */

.messages{
flex:1;
overflow-y:auto;
padding:15px;
color:white;
}

/* bottom chat */

.bottom-chat{
position:fixed;
bottom:0;
left:0;
width:100%;
max-width:100vw;
background:#0f172a;
border-top:1px solid #1e293b;
padding:8px;
}

/* icons row */

.action-row{
display:flex;
gap:14px;
margin-bottom:6px;
}

/* message input */

.msg-row{
display:flex;
align-items:center;
}

.msg-input{
flex:1;
min-width:0;
background:#1e293b;
border:none;
border-radius:25px;
padding:10px 14px;
color:white;
outline:none;
}

/* icons */

.icon{
font-size:22px;
color:white;
}

/* send button */

.send-btn{
display:none;
font-size:22px;
color:#3b82f6;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<button onclick="history.back()">←</button>

<h2 class="font-bold">AGASTYANS</h2>

<button class="text-red-400">Logout</button>

</div>


<!-- MESSAGES -->

<div class="messages">

<div class="mb-3">
<div class="bg-gray-700 px-4 py-2 inline-block rounded-xl">
Hello 👋
</div>
</div>

<div class="mb-3 text-right">
<div class="bg-blue-500 px-4 py-2 inline-block rounded-xl">
Hi there!
</div>
</div>

</div>


<!-- BOTTOM CHAT -->

<div class="bottom-chat">

<!-- ICON ROW -->

<div class="action-row">

<label class="icon">
🖼
<input type="file" hidden accept="image/*">
</label>

<button class="icon">🎤</button>

<button id="sendBtn" class="send-btn">➤</button>

</div>

<!-- MESSAGE INPUT -->

<div class="msg-row">

<input
id="msgInput"
type="text"
placeholder="Message..."
class="msg-input"
/>

</div>

</div>


<script src="chat.js"></script>

</body>
</html>

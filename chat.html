<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#0f172a;
font-family:sans-serif;
overflow:hidden;
}

/* header */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
color:white;
border-bottom:1px solid #1e293b;
}

/* messages */

.messages{
flex:1;
overflow-y:auto;
padding:15px;
color:white;
}

/* bottom chat */

.bottom-chat{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
border-top:1px solid #1e293b;
padding:8px;
}

/* message row */

.msg-row{
display:flex;
align-items:center;
gap:10px;
}

/* icons */

.icon{
width:26px;
height:26px;
stroke:white;
cursor:pointer;
transition:0.2s;
}

/* input */

.msg-input{
flex:1;
background:#1e293b;
border:none;
border-radius:25px;
padding:10px 14px;
color:white;
outline:none;
transition:0.2s;
}

/* send button */

.send-btn{
display:none;
width:26px;
height:26px;
stroke:#3b82f6;
cursor:pointer;
transition:0.2s;
}

/* voice hold animation */

.voice-active{
transform:scale(1.3);
stroke:#ef4444;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<button onclick="history.back()">←</button>

<h2 class="font-bold">AGASTYANS</h2>

<button class="text-red-400">Logout</button>

</div>

<!-- MESSAGES -->

<div class="messages"></div>

<!-- CHAT BAR -->

<div class="bottom-chat">

<div class="msg-row">

<!-- PHOTO -->

<label>
<svg class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="3" y="3" width="18" height="18" rx="2"/>
<circle cx="8.5" cy="8.5" r="1.5"/>
<path d="M21 15l-5-5L5 21"/>
</svg>
<input type="file" hidden accept="image/*">
</label>

<!-- INPUT -->

<input
id="msgInput"
type="text"
placeholder="Message..."
class="msg-input"
/>

<!-- VOICE -->

<svg id="voiceBtn" class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="9" y="2" width="6" height="11" rx="3"/>
<path d="M5 10a7 7 0 0014 0"/>
<line x1="12" y1="19" x2="12" y2="22"/>
</svg>

<!-- SEND -->

<svg id="sendBtn" class="send-btn" fill="none" stroke-width="2" viewBox="0 0 24 24">
<line x1="22" y1="2" x2="11" y2="13"/>
<polygon points="22 2 15 22 11 13 2 9 22 2"/>
</svg>

</div>

</div>

<script src="chat.js"></script>

</body>
</html>

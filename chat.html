<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#0f172a;
font-family:sans-serif;
}

/* header */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:#0f172a;
border-bottom:1px solid #1e293b;
color:white;
}

/* messages */

.messages{
flex:1;
overflow-y:auto;
padding:15px;
}

/* bottom chat */

.bottom-chat{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
border-top:1px solid #1e293b;
padding:8px;
}

/* icons row */

.action-row{
display:flex;
gap:18px;
padding-left:10px;
margin-bottom:6px;
}

/* message row */

.msg-row{
display:flex;
align-items:center;
gap:10px;
}

.msg-input{
flex:1;
background:#1e293b;
border:none;
border-radius:25px;
padding:10px 14px;
color:white;
outline:none;
}

.send-btn{
display:none;
color:#3b82f6;
font-size:22px;
}

.icon{
width:26px;
height:26px;
stroke:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<button onclick="history.back()">
←
</button>

<h1 class="font-bold text-lg">
AGASTYANS
</h1>

<button class="text-red-400">
Logout
</button>

</div>

<!-- MESSAGES -->

<div class="messages">

<div class="mb-3">
<div class="bg-gray-700 text-white px-4 py-2 inline-block rounded-xl">
Hello 👋
</div>
</div>

<div class="mb-3 text-right">
<div class="bg-blue-500 text-white px-4 py-2 inline-block rounded-xl">
Hi there!
</div>
</div>

</div>

<!-- BOTTOM CHAT -->

<div class="bottom-chat">

<!-- ACTION ICONS -->

<div class="action-row">

<!-- IMAGE -->

<label>

<svg class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="3" y="3" width="18" height="18" rx="2"></rect>
<circle cx="8.5" cy="8.5" r="1.5"></circle>
<path d="M21 15l-5-5L5 21"></path>
</svg>

<input type="file" accept="image/*" hidden>

</label>

<!-- VOICE -->

<svg class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="9" y="1" width="6" height="11" rx="3"></rect>
<path d="M5 10a7 7 0 0014 0"></path>
<line x1="12" y1="19" x2="12" y2="23"></line>
</svg>

</div>

<!-- MESSAGE INPUT -->

<div class="msg-row">

<input
id="msgInput"
type="text"
placeholder="Message..."
class="msg-input"
/>

<button id="sendBtn" class="send-btn">
➤
</button>

</div>

</div>

<!-- JS CONNECT -->

<script src="chat.js"></script>

</body>
</html>

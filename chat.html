<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; margin: 0; padding: 0; }
#messages { height: 70vh; overflow-y: auto; padding: 10px; border-bottom: 1px solid #444; }
.msg { margin-bottom: 10px; }
.msg.me { text-align: right; color: #0ff; }
#input-area { display: flex; padding: 10px; gap: 5px; }
#msg-input { flex: 1; padding: 5px; border-radius: 4px; border: none; }
#send-btn { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: none; background: #0ff; color: #000; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>

<h2 style="text-align:center;">Anonymous Chat</h2>
<div id="messages"></div>

<div id="input-area">
<input type="text" id="msg-input" placeholder="Type a message..." />
<button id="send-btn">Send</button>
</div>

<script>
// Get anon username from localStorage
const anonUser = JSON.parse(localStorage.getItem("anon_user"));
if (!anonUser) {
    alert("No username found! Go back and set your username first.");
    window.location.href = "username.html";
}

// References
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");

// Load last 50 messages
async function loadMessages() {
    const { data, error } = await db
        .from("chat_messages")
        .select("*")
        .order("created_at", { ascending: true })
        .limit(50);

    if (error) {
        console.error(error);
        return;
    }

    messagesDiv.innerHTML = "";
    data.forEach(msg => renderMessage(msg));
}

// Render single message
function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg" + (msg.username === anonUser.name ? " me" : "");
    div.innerText = `${msg.username}: ${msg.message}`;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Send message
async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    const { error } = await db.from("chat_messages").insert([{
        username: anonUser.name,
        user_id: anonUser.id,
        message: text
    }]);

    if (error) {
        console.error(error);
        return;
    }

    msgInput.value = "";
}

// Event listeners
sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

// Load messages on page load
loadMessages();

// Optional: simple real-time subscription
db.channel("anon_chat")
  .on("postgres_changes", { event: "INSERT", schema: "public", table: "chat_messages" }, payload => {
    renderMessage(payload.new);
  })
  .subscribe();
</script>

</body>
</html>

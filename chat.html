<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGASTYANS</title>

<link rel="stylesheet" href="agastyans.css">

</head>

<body>

<div class="chat-container">

<!-- HEADER -->

<div class="header">

<button class="backBtn" onclick="goBack()">⬅</button>

<h2>AGASTYANS</h2>

<button class="logoutBtn" onclick="logout()">Logout</button>

</div>


<!-- CHAT -->

<div id="chatBox" class="chat-box"></div>


<!-- INPUT -->

<div class="input-area">

<input id="msgInput" placeholder="Send anonymous message...">

<button onclick="sendMessage()">Send</button>

<button onclick="sendGIF()">GIF</button>

<button onclick="createPoll()">Poll</button>

</div>

</div>

<script src="agastyans.js"></script>

</body>

</html>

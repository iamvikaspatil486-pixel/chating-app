<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Lounge Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="chat.css">
</head>

<body class="bg-slate-900 text-white">

<div id="app" class="flex flex-col h-screen">

  <!-- HEADER -->
  <header class="chat-header flex items-center justify-between px-4 py-2 bg-black/50 backdrop-blur-md border-b border-white/20">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="text-center flex-1">
      <h1 class="text-lg font-bold">AGASTYANS</h1>
      <div id="display-name" class="text-xs opacity-80 mt-1"></div>
      <div id="online-count" class="text-xs opacity-80 mt-1">0 students online</div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <!-- MESSAGES -->
  <div id="messages-container" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 scroll-smooth">
    <!-- Messages will be appended here -->
  </div>

  <!-- TYPING INDICATOR -->
  <div id="typing-indicator" class="text-xs px-4 py-1 opacity-80"></div>

  <!-- INPUT AREA -->
  <div class="input-area flex items-center gap-2 p-3 bg-black/80">
    <button id="voice-btn" class="icon-btn">🎙</button>
    <button id="image-btn" class="icon-btn">🖼</button>
    <input type="file" id="image-input" accept="image/*" hidden>
    <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 px-4 py-2 rounded-full bg-white/10 text-white outline-none">
    <button id="send-btn" class="text-2xl text-cyan-400">➤</button>
  </div>

  <!-- FLOATING POLL BUTTON -->
  <button id="poll-btn" class="poll-floating fixed right-4 bottom-24 bg-cyan-400 text-black px-4 py-2 rounded-full shadow-lg font-bold">Poll</button>

  <!-- POLL CREATOR OVERLAY -->
  <div id="poll-creator" class="overlay hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="poll-box bg-white/10 p-5 rounded-xl w-80 text-white">
      <h3 class="text-lg font-bold mb-3">Create Poll</h3>
      <input type="text" id="poll-question" placeholder="Ask a question" class="w-full p-2 rounded mb-2 text-black">
      <input type="text" class="poll-option p-2 rounded mb-2 text-black" placeholder="Option 1">
      <input type="text" class="poll-option p-2 rounded mb-2 text-black" placeholder="Option 2">
      <input type="text" class="poll-option p-2 rounded mb-2 text-black" placeholder="Option 3">
      <input type="text" class="poll-option p-2 rounded mb-4 text-black" placeholder="Option 4">
      <div class="flex gap-2">
        <button id="create-poll" class="flex-1 bg-cyan-400 text-black p-2 rounded font-bold">Create</button>
        <button id="cancel-poll" class="flex-1 bg-red-500 text-white p-2 rounded font-bold">Cancel</button>
      </div>
    </div>
  </div>

</div>

<script src="supabase.js"></script>
<script src="chat.js"></script>
</body>
</html>

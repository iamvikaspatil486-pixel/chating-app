<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0,
maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:url("chat-bg.jpg") center/cover no-repeat;
}

.chat-wrapper{
height:100vh;
display:flex;
flex-direction:column;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.input-bar{
padding:10px;
border-top:1px solid #333;
background:rgba(0,0,0,0.7);
}

.msg-input{
background:#1f2937;
}

</style>

</head>

<body>

<div class="chat-wrapper">

<!-- TOP BAR -->

<div class="flex items-center justify-between
px-4 py-3 border-b border-gray-700">

<button class="text-white text-xl">
←
</button>

<h1 class="text-white font-bold text-lg">
AGASTYANS
</h1>

<button class="text-red-400 text-sm">
Logout
</button>

</div>


<!-- MESSAGES AREA -->

<div class="messages">

<!-- received -->

<div class="mb-3">

<div class="inline-block
bg-gray-700 text-white
px-4 py-2 rounded-2xl">

Hello 👋

</div>

</div>

<!-- sent -->

<div class="mb-3 text-right">

<div class="inline-block
bg-blue-500 text-white
px-4 py-2 rounded-2xl">

Hi there!

</div>

</div>

</div>


<!-- MESSAGE INPUT BAR -->

<div class="input-bar">

<div class="flex items-center gap-2">

<button class="text-white text-xl">
➕
</button>

<input
type="text"
placeholder="Message..."
class="msg-input flex-1
p-2 rounded-full
text-white outline-none
px-4"
/>

<button class="text-white text-xl">
🎤
</button>

<button class="text-blue-400 text-xl">
➤
</button>

</div>

</div>

</div>

</body>

</html>

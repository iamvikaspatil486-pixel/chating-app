<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0, final-scale=1.0, user scalable = no">

<title>AGASTYANS Chat</title>

<link rel="stylesheet" href="chat.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>
<script src="auth.js"></script>

</head>

<body>

<!-- USERNAME POPUP -->

<div id="usernamePopup" class="popup">

<div class="popup-box">

<h3>Select Username</h3>

<select id="usernameSelect">

<option value="">none</option>
<option>f_the_mf</option>
<option>princess</option>
<option>ghostmode</option>
<option>chaoskid</option>
<option>nightowl</option>

</select>

<input id="customUsername" placeholder="Create your own username">

<button onclick="saveUsername()">Enter Chat</button>

</div>
</div>


<div class="chat-container">

<header class="topbar">

<button onclick="history.back()">BACK</button>

<h2>AGASTYANS</h2>

<button id="logout">LOGOUT</button>

</header>


<div id="messages" class="messages"></div>


<div id="typingIndicator" class="typing hidden">
Someone is typing...
</div>


<div id="replyBox" class="reply hidden">

<span id="replyText"></span>

<button onclick="cancelReply()">x</button>

</div>


<footer class="inputBar">

<input id="messageInput" placeholder="Message...">

<button id="gifBtn">GIF</button>

<button id="voiceBtn">🎤</button>

<button id="sendBtn">➤</button>

</footer>

</div>


<button class="pollBtn">📊</button>


<script src="chat.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agastyans Anonymous</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div id="setup-overlay">
        <div class="popup">
            <h2>Pick a Temporary Identity</h2>
            <div id="genz-options"></div>
            <input type="text" id="custom-name" placeholder="Or type a burner name...">
            <button class="join-btn" id="join-chat">Enter Chat</button>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">Messages vanish after 10 hours.</p>
        </div>
    </div>

    <div class="chat-container">
        <header>
            <button class="icon-btn"><i data-lucide="chevron-left"></i></button>
            <div class="header-title">AGASTYANS</div>
            <button class="icon-btn" id="logout-btn"><i data-lucide="log-out"></i></button>
        </header>

        <div class="chat-box" id="chat-messages">
            </div>

        <div class="input-area">
            <button class="icon-btn"><i data-lucide="camera" style="color: #0095f6"></i></button>
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Message...">
                <button class="icon-btn" id="send-btn" style="display:none;"><i data-lucide="send" style="color: #0095f6"></i></button>
                <div id="input-icons" style="display: flex; gap: 10px;">
                    <button class="icon-btn"><i data-lucide="mic"></i></button>
                    <button class="icon-btn"><i data-lucide="image"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>

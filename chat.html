<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agastyans Anon</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000;
            --surface: #121212;
            --input-bg: #262626;
            --accent: #0095f6;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        /* Prevents horizontal scroll and fits mobile screen exactly */
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: fixed; /* Prevents bounce scroll on iOS */
        }

        /* --- POPUP --- */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .popup {
            background: #1c1c1c; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center;
            border: 1px solid #333;
        }
        .genz-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 15px 0; }
        .user-opt { 
            background: var(--input-bg); border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.9rem;
        }
        #custom-name {
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; 
            border-radius: 12px; color: white; margin-bottom: 15px; outline: none;
        }

        /* --- HEADER --- */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; border-bottom: 1px solid #262626; min-height: 50px;
        }
        .header-title { font-weight: 800; letter-spacing: 1.5px; font-size: 0.9rem; }

        /* --- CHAT AREA --- */
        #chat-messages {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; word-wrap: break-word; }
        .msg.received { background: var(--input-bg); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.sent { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .sender { display: block; font-size: 0.7rem; opacity: 0.7; margin-bottom: 3px; font-weight: bold; }

        /* --- INPUT AREA --- */
        .input-container { padding: 10px 10px 30px 10px; background: var(--bg); }
        .input-pill {
            background: var(--input-bg); border-radius: 30px; padding: 5px 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .input-pill input {
            flex: 1; background: transparent; border: none; color: white; outline: none; 
            font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
            padding: 8px 0;
        }
        .icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 6px; display: flex; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="popup">
            <h2 style="font-size: 1rem;">Who are you tonight?</h2>
            <div class="genz-grid" id="genz-options"></div>
            <input type="text" id="custom-name" placeholder="Type custom name...">
            <button class="user-opt" style="background: var(--accent); border:none; font-weight: bold;" onclick="finishLogin()">Join Chat</button>
        </div>
    </div>

    <header>
        <button class="icon-btn"><i data-lucide="chevron-left"></i></button>
        <div class="header-title">AGASTYANS</div>
        <button class="icon-btn" onclick="location.reload()"><i data-lucide="log-out"></i></button>
    </header>

    <div id="chat-messages">
        <div class="msg received">
            <span class="sender">System</span>
            Welcome to the void. Messages vanish in 10 hours.
        </div>
    </div>

    <input type="file" id="photo-input" accept="image/*,video/*" class="hidden">

    <div class="input-container">
        <div class="input-pill">
            <button class="icon-btn" onclick="document.getElementById('photo-input').click()">
                <i data-lucide="camera" style="color: var(--accent)"></i>
            </button>
            
            <input type="text" id="main-input" placeholder="Message..." autocomplete="off">
            
            <div id="quick-icons" style="display: flex; gap: 2px;">
                <button class="icon-btn"><i data-lucide="mic"></i></button>
                <button class="icon-btn" onclick="document.getElementById('photo-input').click()">
                    <i data-lucide="image"></i>
                </button>
            </div>

            <button id="send-btn" class="icon-btn hidden" onclick="sendMessage()">
                <span style="color: var(--accent); font-weight: bold; padding-right: 5px;">Send</span>
            </button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SB_URL = "YOUR_SUPABASE_URL";
        const SB_KEY = "YOUR_SUPABASE_KEY";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        const genZBurners = ["VibeDestroyer_fr", "NoCap_Agastyan", "GhostMode_ON", "Delulu_Realist", "MainCharacter_Vibes"];
        
        lucide.createIcons();

        // UI Setup
        const grid = document.getElementById('genz-options');
        const input = document.getElementById('main-input');
        const quickIcons = document.getElementById('quick-icons');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-messages');

        genZBurners.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'user-opt';
            btn.innerText = name;
            btn.onclick = () => finishLogin(name);
            grid.appendChild(btn);
        });

        // Toggle Icons/Send Button
        input.addEventListener('input', () => {
            const hasText = input.value.trim().length > 0;
            quickIcons.classList.toggle('hidden', hasText);
            sendBtn.classList.toggle('hidden', !hasText);
        });

        // Login Logic
        function finishLogin(name) {
            const finalName = name || document.getElementById('custom-name').value.trim();
            if(!finalName) return alert("Select a name!");
            sessionStorage.setItem('anon_user', finalName);
            document.getElementById('setup-overlay').classList.add('hidden');
            loadMessages();
            subscribeLive();
        }

        // --- 2. SUPABASE LOGIC ---
        async function loadMessages() {
            const tenHoursAgo = new Date(Date.now() - 10 * 60 * 60 * 1000).toISOString();
            const { data } = await supabase.from('messages').select('*').gt('created_at', tenHoursAgo).order('created_at', { ascending: true });
            if (data) {
                chatBox.innerHTML = '';
                data.forEach(msg => renderMessage(msg));
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function subscribeLive() {
            supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                renderMessage(payload.new);
                chatBox.scrollTop = chatBox.scrollHeight;
            }).subscribe();
        }

        async function sendMessage() {
            const text = input.value.trim();
            const user = sessionStorage.getItem('anon_user');
            if(!text) return;
            const { error } = await supabase.from('messages').insert([{ content: text, username: user }]);
            if(!error) {
                input.value = '';
                input.dispatchEvent(new Event('input'));
            }
        }

        function renderMessage(msg) {
            const isMe = msg.username === sessionStorage.getItem('anon_user');
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<span class="sender">${isMe ? 'You' : msg.username}</span>${msg.content}`;
            chatBox.appendChild(div);
        }
    </script>
</body>
</html>

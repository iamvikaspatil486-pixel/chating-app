<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#000;
font-family:sans-serif;
}

/* top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#000;
color:white;
border-bottom:1px solid #333;
}

/* messages */

.messages{
flex:1;
overflow-y:auto;
padding:15px;
color:white;
}

/* bottom area */

.bottom-area{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:8px;
border-top:1px solid #333;
}

/* icons row */

.action-icons{
display:flex;
gap:18px;
padding-left:10px;
margin-bottom:6px;
}

/* message row */

.msg-row{
display:flex;
align-items:center;
gap:10px;
}

.msg-input{
flex:1;
background:#1f2937;
color:white;
border:none;
border-radius:25px;
padding:10px 14px;
outline:none;
}

.send-btn{
display:none;
color:#3b82f6;
font-size:22px;
}

/* outline icons */

.icon{
width:26px;
height:26px;
stroke:white;
cursor:pointer;
}

</style>

</head>

<body>


<!-- TOP BAR -->

<div class="topbar">

<button>←</button>

<h2 class="font-bold">AGASTYANS</h2>

<button class="text-red-400">Logout</button>

</div>


<!-- MESSAGES -->

<div class="messages">

<div class="mb-3">
<div class="bg-gray-700 inline-block px-4 py-2 rounded-xl">
Hello 👋
</div>
</div>

<div class="mb-3 text-right">
<div class="bg-blue-500 inline-block px-4 py-2 rounded-xl">
Hi there!
</div>
</div>

</div>


<!-- BOTTOM CHAT UI -->

<div class="bottom-area">

<!-- ICONS ABOVE INPUT -->

<div class="action-icons">

<!-- IMAGE -->

<label>

<svg class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="3" y="3" width="18" height="18" rx="2"></rect>
<circle cx="8.5" cy="8.5" r="1.5"></circle>
<path d="M21 15l-5-5L5 21"></path>
</svg>

<input type="file" accept="image/*" hidden>

</label>


<!-- VOICE -->

<svg class="icon" fill="none" stroke-width="2" viewBox="0 0 24 24">
<rect x="9" y="1" width="6" height="11" rx="3"></rect>
<path d="M5 10a7 7 0 0014 0"></path>
<line x1="12" y1="19" x2="12" y2="23"></line>
</svg>

</div>


<!-- MESSAGE INPUT -->

<div class="msg-row">

<input
id="msgInput"
type="text"
placeholder="Message..."
class="msg-input"
/>

<button id="sendBtn" class="send-btn">
➤
</button>

</div>

</div>


<script>

const input = document.getElementById("msgInput")
const send = document.getElementById("sendBtn")

input.addEventListener("input", () => {

if(input.value.trim() !== ""){
send.style.display="block"
}else{
send.style.display="none"
}

})

</script>


</body>
</html>

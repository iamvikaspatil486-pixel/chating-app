<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="login-screen" class="overlay">
            <div class="glass-card">
                <h2>Set Your Vibe</h2>
                <div class="suggestions">
                    <span class="badge" onclick="fillName('peace_destroyer')">peace_destroyer</span>
                    <span class="badge" onclick="fillName('academic_weapon')">academic_weapon</span>
                    <span class="badge" onclick="fillName('caffeine_demon')">caffeine_demon</span>
                </div>
                <input type="text" id="username-input" placeholder="Enter username..." maxlength="15">
                <button id="join-btn">Enter Chat</button>
                <p id="error-msg"></p>
            </div>
        </div>

        <div id="chat-screen" class="hidden">
            <header>
                <div class="user-info">
                    <span id="display-name"></span>
                    <span class="status-dot"></span>
                </div>
                <div class="timer-info">Auto-delete: 10h</div>
            </header>
            
            <div id="messages-container"></div>

            <div class="input-area">
                <button id="gif-btn">GIF</button>
                <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">🚀</button>
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>

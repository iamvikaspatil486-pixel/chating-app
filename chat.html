<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>


<body class="h-screen flex flex-col bg-cover bg-center"
style="background-image:url('chat.png')">


<!-- HEADER -->

<header class="fixed top-0 left-0 right-0 bg-slate-900 text-white
flex items-center justify-between px-4 h-14 border-b border-slate-700">

<button id="backBtn"
class="text-sm font-semibold">
Back
</button>

<h1 class="font-bold text-lg tracking-wide">
AGASTYANS
</h1>

<button id="logoutBtn"
class="text-red-400 text-sm font-semibold">
Logout
</button>

</header>



<!-- CHAT AREA -->

<main id="chatArea"
class="flex-1 overflow-y-auto pt-16 pb-24 px-3 space-y-3">

<!-- messages will load here -->

</main>



<!-- REPLY PREVIEW -->

<div id="replyPreview"
class="hidden fixed bottom-20 left-0 right-0
bg-slate-800 text-white px-4 py-2 text-sm">

Replying...

</div>



<!-- MESSAGE BAR -->

<footer
class="fixed bottom-0 left-0 right-0
bg-slate-900 border-t border-slate-700
flex items-center gap-2 px-2 h-16">


<!-- VOICE BUTTON -->

<button id="voiceBtn"
class="p-2 text-white">
<i data-lucide="mic"></i>
</button>


<!-- PHOTO / VIDEO BUTTON -->

<button id="mediaBtn"
class="p-2 text-white">
<i data-lucide="image"></i>
</button>


<!-- MESSAGE INPUT -->

<input
id="msgInput"
class="flex-1 bg-slate-800 text-white rounded-full px-4 py-2 outline-none text-sm"
placeholder="Message...">


<!-- SEND BUTTON -->

<button id="sendBtn"
class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm">
Send
</button>

</footer>



<!-- POLL BUTTON -->

<button id="pollBtn"
class="fixed bottom-24 right-4 w-14 h-14
bg-red-500 text-white rounded-full
flex items-center justify-center shadow-lg">

<i data-lucide="bar-chart"></i>

</button>



<script>
lucide.createIcons()
</script>


</body>
</html>

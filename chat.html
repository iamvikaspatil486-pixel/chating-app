<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGASTYANS Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

<style>

body{
margin:0;
height:100dvh;
display:flex;
flex-direction:column;
background:url("chat.png") center/cover no-repeat fixed;
font-family:sans-serif;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 12px;
z-index:10;
}

/* CHAT AREA */

#chatArea{
flex:1;
overflow-y:auto;
padding:70px 10px 80px 10px;
}

/* CHAT BUBBLES */

.message{
max-width:70%;
padding:10px 14px;
border-radius:18px;
margin:6px 0;
font-size:14px;
word-wrap:break-word;
}

.me{
background:#3797f0;
color:white;
margin-left:auto;
}

.other{
background:white;
}

/* MESSAGE BAR */

#messageBar{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:white;
border-top:1px solid #ddd;
display:flex;
align-items:center;
gap:6px;
padding:6px;
}

#msgInput{
flex:1;
border:none;
background:#eee;
border-radius:20px;
padding:8px 12px;
}

/* POLL BUTTON */

#pollBtn{
position:fixed;
bottom:80px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#ff3040;
color:white;
font-size:22px;
border:none;
}

</style>

</head>


<body>

<header>

<button onclick="history.back()">Back</button>

<b>AGASTYANS</b>

<button id="logoutBtn">Logout</button>

</header>


<div id="chatArea"></div>


<button id="pollBtn">📊</button>


<div id="messageBar">

<button id="voiceBtn">
<i data-lucide="mic"></i>
</button>

<button id="photoBtn">
<i data-lucide="image"></i>
</button>

<button id="videoBtn">
<i data-lucide="video"></i>
</button>

<input id="msgInput" placeholder="Message...">

<button id="sendBtn">➤</button>

</div>


<script>

lucide.createIcons()

const chatArea = document.getElementById("chatArea")
const input = document.getElementById("msgInput")

let userId=null
let replyTo=null


async function init(){

const {data:{user}} = await db.auth.getUser()

userId = user.id

loadMessages()
subscribeMessages()

}

init()



async function sendMessage(){

const text=input.value.trim()

if(!text) return

await db.from("messages").insert({

text:text,
user_id:userId,
reply_to:replyTo

})

input.value=""
replyTo=null

}



document.getElementById("sendBtn").onclick=sendMessage



async function loadMessages(){

const {data} = await db
.from("messages")
.select("*")
.order("created_at",{ascending:true})

chatArea.innerHTML=""

data.forEach(renderMessage)

scrollBottom()

}



function renderMessage(msg){

const div=document.createElement("div")

div.classList.add("message")

if(msg.user_id===userId){
div.classList.add("me")
}else{
div.classList.add("other")
}

div.innerText=msg.text

/* SWIPE REPLY */

let startX=0

div.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

div.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>80){

replyTo=msg.id
alert("Replying to message")

}

})


/* REACTIONS */

div.addEventListener("contextmenu",e=>{
e.preventDefault()

let emoji=prompt("React 👍 ❤️ 😂 🔥")

if(emoji){

db.from("reactions").insert({

message_id:msg.id,
emoji:emoji,
user_id:userId

})

}

})

chatArea.appendChild(div)

}



function subscribeMessages(){

db.channel("chat")

.on("postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

renderMessage(payload.new)
scrollBottom()

})

.subscribe()

}



function scrollBottom(){

chatArea.scrollTop=chatArea.scrollHeight

}



document.getElementById("logoutBtn").onclick=async()=>{

await db.auth.signOut()

location.href="login.html"

}



/* POLL BUTTON */

document.getElementById("pollBtn").onclick=()=>{

let q=prompt("Poll Question")

if(q){

db.from("polls").insert({

question:q

})

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agastyans Anon</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000;
            --surface: #121212;
            --input-bg: #262626;
            --accent: #0095f6;
            --text: #ffffff;
            --secondary-text: #a8a8a8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- POPUP --- */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .popup {
            background: #1c1c1c; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center;
            border: 1px solid #333;
        }
        .popup h2 { margin-bottom: 15px; font-size: 1.1rem; }
        .genz-grid { display: grid; gap: 8px; margin-bottom: 15px; }
        .user-opt { 
            background: var(--input-bg); border: 1px solid #444; color: white; 
            padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.9rem;
        }
        .user-opt:hover { background: #444; }
        #custom-name {
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; 
            border-radius: 10px; color: white; margin-bottom: 15px; outline: none;
        }

        /* --- HEADER --- */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; border-bottom: 1px solid #262626; background: var(--bg);
        }
        .header-title { font-weight: 800; letter-spacing: 1.5px; font-size: 0.9rem; color: #efefef; }

        /* --- CHAT AREA --- */
        #chat-messages {
            flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px;
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .msg.received { background: var(--input-bg); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg .sender { display: block; font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-weight: bold; }

        /* --- INPUT BAR --- */
        .input-container { padding: 10px 15px 25px 15px; background: var(--bg); }
        .input-pill {
            background: var(--input-bg); border-radius: 30px; padding: 5px 15px;
            display: flex; align-items: center; gap: 10px; min-height: 44px;
        }
        .input-pill input {
            flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem;
        }
        .icon-btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; display: flex; align-items: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="popup">
            <h2>Who are you tonight?</h2>
            <div class="genz-grid" id="genz-options"></div>
            <input type="text" id="custom-name" placeholder="Type a burner name...">
            <button class="user-opt" style="background: var(--accent); border:none;" onclick="finishLogin()">Join Agastyans</button>
        </div>
    </div>

    <header>
        <button class="icon-btn"><i data-lucide="chevron-left"></i></button>
        <div class="header-title">AGASTYANS</div>
        <button class="icon-btn" onclick="location.reload()"><i data-lucide="log-out"></i></button>
    </header>

    <div id="chat-messages">
        <div class="msg received">
            <span class="sender">System</span>
            Welcome to the void. Messages vanish in 10 hours.
        </div>
    </div>

    <div class="input-container">
        <div class="input-pill">
            <button class="icon-btn"><i data-lucide="camera" style="color: var(--accent)"></i></button>
            <input type="text" id="main-input" placeholder="Message..." autocomplete="off">
            
            <div id="quick-icons" style="display: flex; gap: 5px;">
                <button class="icon-btn"><i data-lucide="mic"></i></button>
                <button class="icon-btn"><i data-lucide="image"></i></button>
            </div>

            <button id="send-btn" class="icon-btn hidden">
                <span style="color: var(--accent); font-weight: bold;">Send</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script>
        lucide.createIcons();

        // Send Button Toggle Logic
        const input = document.getElementById('main-input');
        const quickIcons = document.getElementById('quick-icons');
        const sendBtn = document.getElementById('send-btn');

        input.addEventListener('input', () => {
            if(input.value.trim().length > 0) {
                quickIcons.classList.add('hidden');
                sendBtn.classList.remove('hidden');
            } else {
                quickIcons.classList.remove('hidden');
                sendBtn.classList.add('hidden');
            }
        });
    </script>
</body>
</html>

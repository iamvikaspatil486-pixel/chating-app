<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Students Harate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: pan-x pan-y; overscroll-behavior: none; }
        .input-field { @apply w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-all; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">

    <main class="flex-grow flex flex-col items-center justify-center px-6 py-10">
        <div class="w-full max-w-md">
            <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">Create Account</h2>
            <p class="text-slate-400 mb-8 text-sm">Please use your original name so admins can verify you and prevent fake accounts.</p>

            <form id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase ml-1 mb-1">Original Name</label>
                    <input type="text" id="fullName" placeholder="Enter your real name" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full focus:outline-none focus:border-cyan-500" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase ml-1 mb-1">Nickname (Optional)</label>
                    <input type="text" id="nickname" placeholder="What should friends call you?" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full focus:outline-none focus:border-cyan-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase ml-1 mb-1">Roll No.</label>
                    <input type="text" id="rollNo" placeholder="Enter unique roll number" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full focus:outline-none focus:border-cyan-500" required>
                    <p id="rollError" class="text-red-500 text-xs mt-1 hidden">This Roll No. is already taken!</p>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase ml-1 mb-1">College Email</label>
                    <input type="email" id="email" placeholder="email@college.edu" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full focus:outline-none focus:border-cyan-500" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase ml-1 mb-1">Set Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full focus:outline-none focus:border-cyan-500" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold text-lg mt-4 opacity-50 cursor-not-allowed transition-all" disabled>
                    Request Admin Approval
                </button>
            </form>
            
            <p class="text-center text-slate-500 mt-6 text-sm">
                Already have an account? <a href="index.html" class="text-cyan-400">Login</a>
            </p>
        </div>
    </main>

    <script>
        // Simple logic to enable button only when form is filled 
        // (Real logic would include Email Verification check)
        const form = document.getElementById('registrationForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('input', () => {
            const isValid = form.checkValidity();
            if(isValid) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.disabled = true;
            }
        });
    </script>
</body>
</html>

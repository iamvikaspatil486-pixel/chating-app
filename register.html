<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Join Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>

html, body{
height:100%;
overflow:hidden;
}

.step{
display:none;
}

.step.active{
display:block;
}

</style>

</head>

<body class="bg-slate-900 text-white font-sans h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md">

<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 text-center">
Join Now
</h2>

<form id="registrationForm" class="space-y-4" onsubmit="handleJoinNow(event)">

<!-- STEP 1 -->

<div id="step1" class="step active space-y-4">

<p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">
Step 1: Identity
</p>

<input type="text" id="fullName" placeholder="Original Name"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>

<input type="text" id="rollNo" placeholder="Roll No."
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>

<input type="text" id="nickname" placeholder="Nickname (Optional)"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">

<input type="email" id="email" placeholder="Email"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>

<button type="button" onclick="nextStep()"
class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">

Next

</button>

</div>

<!-- STEP 2 -->

<div id="step2" class="step space-y-4">

<p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">
Step 2: Security
</p>

<input type="password" id="password" placeholder="Set Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>

<input type="password" id="confPass" placeholder="Confirm Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>

<div class="flex gap-4 mt-4">

<button type="button" onclick="prevStep()"
class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">

Back

</button>

<button type="submit" id="submitBtn"
class="flex-[2] py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">

Request Admin Approval

</button>

</div>

</div>

</form>

</div>

<script>

lucide.createIcons();

function nextStep(){

document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");

}

function prevStep(){

document.getElementById("step2").classList.remove("active");
document.getElementById("step1").classList.add("active");

}

async function handleJoinNow(event){

event.preventDefault();

const btn = document.getElementById("submitBtn");

const fullName = document.getElementById("fullName").value;
const rollNo = document.getElementById("rollNo").value;
const nickname = document.getElementById("nickname").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const confPass = document.getElementById("confPass").value;

if(password !== confPass){
alert("Passwords do not match");
return;
}

btn.innerText = "Processing...";
btn.disabled = true;

try{

const { data, error } = await supabase.auth.signUp({
email: email,
password: password
});

if(error) throw error;

await supabase
.from("students")
.insert([
{
name: fullName,
roll_no: rollNo,
nickname: nickname,
email: email,
status: "pending"
}
]);

btn.innerText = "Request Sent";

alert("Registration successful! Check your email to verify.");

}
catch(err){

btn.innerText = "Try Again";
btn.disabled = false;

alert("Error: " + err.message);

}

}

</script>

</body>
</html>

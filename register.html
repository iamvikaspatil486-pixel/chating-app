<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Students Harate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { touch-action: pan-x pan-y; overscroll-behavior: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">

    <main class="flex-grow flex flex-col items-center justify-center px-6 py-10">
        <div class="w-full max-w-md">
            <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">Create Account</h2>
            <p class="text-slate-400 mb-6 text-sm">Use your original name for admin verification.</p>

            <form id="registrationForm" class="space-y-4">
                <input type="text" id="fullName" placeholder="Original Name" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:border-cyan-500 outline-none" required>
                <input type="text" id="rollNo" placeholder="Roll No." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:border-cyan-500 outline-none" required>
                
                <div class="flex gap-2">
                    <input type="email" id="email" placeholder="College Email" class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:border-cyan-500 outline-none" required>
                    <button type="button" class="bg-cyan-600 px-4 rounded-xl text-sm font-bold active:scale-95">Verify</button>
                </div>

                <div class="relative">
                    <input type="password" id="password" placeholder="Set Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:border-cyan-500 outline-none" required>
                    <button type="button" onclick="togglePass('password')" class="absolute right-4 top-3.5 text-slate-500">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="relative">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:border-cyan-500 outline-none" required>
                    <button type="button" onclick="togglePass('confirmPassword')" class="absolute right-4 top-3.5 text-slate-500">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>

                <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold text-lg mt-4 shadow-lg shadow-cyan-500/20">
                    Request Admin Approval
                </button>
            </form>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Toggle Password Visibility
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>Register</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a5cff">
<link rel="icon" href="icon.png">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a5cff,#8f7bff,#b7aaff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:35px;
border-radius:20px;
width:330px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:12px;
background:#6a5cff;
color:white;
font-size:16px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Nickname (optional)">

<input type="text" placeholder="Roll Number">

<input type="email" placeholder="Email">

<button onclick="verify()">Verify Email</button>

<p id="msg" class="success"></p>

</div>

<script>

function verify(){

document.getElementById("msg").innerHTML =
"✅ Email Verified. Request sent for Admin Approval."

}

</script>

</body>
</html>

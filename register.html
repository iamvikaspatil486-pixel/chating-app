<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Students Harate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md">
    <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 text-center">
        Join Now
    </h2>

    <form id="registrationForm" class="space-y-4" onsubmit="handleJoinNow(event)">
        
        <div id="step1" class="step active space-y-4">
            <p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">Step 1: Identity</p>
            <input type="text" id="fullName" placeholder="Original Name" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
            <input type="text" id="rollNo" placeholder="Roll No." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
            <input type="text" id="nickname" placeholder="Nickname (Optional)" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3">
            <input type="email" id="email" placeholder="Email" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
            <button type="button" onclick="nextStep()" class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">Next</button>
        </div>

        <div id="step2" class="step space-y-4">
            <p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">Step 2: Security</p>
            
            <div class="relative">
                <input type="password" id="password" placeholder="Set Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
                <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3 text-slate-400">
                    <i id="password-icon" data-lucide="eye"></i>
                </button>
            </div>

            <div class="relative">
                <input type="password" id="confPass" placeholder="Confirm Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
                <button type="button" onclick="togglePassword('confPass')" class="absolute right-3 top-3 text-slate-400">
                    <i id="confPass-icon" data-lucide="eye"></i>
                </button>
            </div>

            <div class="flex gap-4 mt-4">
                <button type="button" onclick="prevStep()" class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold text-sm">Back</button>
                <button type="submit" id="submitBtn" class="flex-[2] py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">Request Admin</button>
            </div>
        </div>
    </form>
</div>

<script>
    lucide.createIcons();
    function nextStep() {
        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");
    }
    function prevStep() {
        document.getElementById("step2").classList.remove("active");
        document.getElementById("step1").classList.add("active");
    }
</script>

</body>
</html>

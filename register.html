<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Join Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>

html, body{
height:100%;
overflow:hidden;      /* stops scrolling */
}

body{
touch-action:manipulation;
overscroll-behavior:none;
}

.step{
display:none;
}

.step.active{
display:block;
}

</style>
</head>

<body class="bg-slate-900 text-white font-sans h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md mx-auto">

<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 text-center">
Join Now
</h2>

<form id="multiStepForm" class="space-y-4" onsubmit="handleFinalSubmit(event)">

<!-- STEP 1 -->

<div id="step1" class="step active space-y-4">

<p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">
Step 1: Identity
</p>

<input
type="text"
id="fullName"
placeholder="Original Name"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all"
required>

<input
type="text"
id="rollNo"
placeholder="Roll No."
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all"
required>

<input
type="text"
id="nickname"
placeholder="Nickname (Optional)"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all">


<!-- EMAIL SECTION FIXED -->

<div class="flex gap-2 items-center">

<input
type="email"
id="email"
placeholder="Email"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all"
required>

<button
type="button"
onclick="alert('Verification sent!')"
class="px-4 py-3 bg-cyan-600 rounded-xl text-xs font-bold active:scale-95 whitespace-nowrap">

Verify

</button>

</div>


<button
type="button"
onclick="nextStep()"
class="w-full py-4 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-2xl font-bold text-lg mt-4 transition-all active:scale-95">

Next

</button>

</div>


<!-- STEP 2 -->

<div id="step2" class="step space-y-4">

<p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-4">
Step 2: Security
</p>

<div class="relative">

<input
type="password"
id="pass"
placeholder="Set Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all"
required>

<button
type="button"
onclick="togglePass('pass')"
class="absolute right-4 top-3.5 text-slate-500">

<i data-lucide="eye" class="w-5 h-5"></i>

</button>

</div>


<div class="relative">

<input
type="password"
id="confPass"
placeholder="Confirm Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all"
required>

<button
type="button"
onclick="togglePass('confPass')"
class="absolute right-4 top-3.5 text-slate-500">

<i data-lucide="eye" class="w-5 h-5"></i>

</button>

</div>


<div class="flex gap-4 mt-4">

<button
type="button"
onclick="prevStep()"
class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold active:scale-95">

Back

</button>


<button
type="submit"
id="submitBtn"
class="flex-[2] py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">

Request Admin Approval

</button>

</div>

</div>

</form>

</div>


<script>

lucide.createIcons();

function togglePass(id){

const el=document.getElementById(id);

el.type=el.type==="password"?"text":"password";

}

function nextStep(){

document.getElementById('step1').classList.remove('active');

document.getElementById('step2').classList.add('active');

}

function prevStep(){

document.getElementById('step2').classList.remove('active');

document.getElementById('step1').classList.add('active');

}

function handleFinalSubmit(event){

event.preventDefault();

const btn=document.getElementById('submitBtn');

btn.innerHTML="Request Sent";

btn.classList.remove('from-cyan-600','to-blue-600');

btn.classList.add('bg-slate-700','cursor-default');

btn.disabled=true;

/* Supabase insert logic will go here */

}

</script>

</body>
</html>

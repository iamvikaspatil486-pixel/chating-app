<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Students Harate</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#cbd5f5;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
}

button:disabled{
background:#475569;
}

.back{
position:absolute;
top:20px;
left:20px;
background:none;
border:none;
color:white;
font-size:18px;
}

.error{
color:#f87171;
font-size:13px;
margin-top:4px;
}

.note{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<button class="back" onclick="history.back()">←</button>

<div class="container">

<h1>STUDENTS HARATE</h1>
<div class="subtitle">Create your account</div>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name" required>
<div class="note">Use your original name for admin approval</div>

<input type="text" id="roll" placeholder="Roll Number" required>
<div class="error" id="rollError"></div>

<input type="text" placeholder="Nickname (optional)">

<input type="email" id="email" placeholder="Email for verification" required>

<input type="password" id="password" placeholder="Create Password" required>

<button id="registerBtn" disabled>
Send Request to Admin
</button>

</form>

</div>

<script>

const form = document.getElementById("registerForm");
const btn = document.getElementById("registerBtn");

const inputs = form.querySelectorAll("input");

inputs.forEach(input=>{
input.addEventListener("input",()=>{
let filled=true;

inputs.forEach(i=>{
if(i.required && i.value===""){
filled=false;
}
});

btn.disabled=!filled;
});
});


/* Example roll number check */

document.getElementById("roll").addEventListener("blur", async ()=>{

let roll=document.getElementById("roll").value;

let error=document.getElementById("rollError");


// Here later we check Supabase database

if(roll==="123"){   // example duplicate

error.textContent="Roll number already taken";

btn.disabled=true;

}else{

error.textContent="";

}

});


form.addEventListener("submit",(e)=>{

e.preventDefault();

alert("Registration request sent to admin");

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

input,button{
font-size:16px;
}

.step{display:none;}
.step.active{display:block;}

</style>

</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6 overflow-hidden">

<div class="w-full max-w-md bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-2xl">

<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-8 text-center">
Login
</h2>

<!-- STEP 1 -->
<div id="loginStep1" class="step active space-y-4">

<input
type="text"
id="loginRollNo"
placeholder="Enter Roll No."
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">

<button onclick="checkUser()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold hover:bg-slate-600">
Next
</button>

</div>


<!-- STEP 2 -->
<div id="loginStep2" class="step space-y-4">

<div class="relative">

<input
type="password"
id="loginPassword"
placeholder="Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">

<button onclick="togglePass('loginPassword')" class="absolute right-4 top-3.5 text-slate-500">
<i id="loginPassword-icon" data-lucide="eye"></i>
</button>

</div>

<button onclick="handleLogin()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">
Login
</button>

<div class="flex justify-between px-2">

<button onclick="showStep('loginStep1')" class="text-xs text-slate-500 uppercase font-bold">
Back
</button>

<button onclick="showStep('forgotStep')" class="text-xs text-cyan-500 uppercase font-bold">
Forgot Password?
</button>

</div>

</div>


<!-- FORGOT PASSWORD -->
<div id="forgotStep" class="step space-y-4">

<p class="text-slate-400 text-sm text-center">
Enter your verified email.
</p>

<input
type="email"
id="resetEmail"
placeholder="your@email.com"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">

<button onclick="sendResetLink()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold text-cyan-400">
Send Reset Link
</button>

<button onclick="showStep('loginStep2')" class="w-full text-center text-xs text-slate-500 uppercase font-bold">
Cancel
</button>

</div>

</div>


<!-- SCRIPT ORDER IMPORTANT -->

<script src="supabase.js"></script>
<script src="login.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>

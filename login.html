<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js" defer></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md">

<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 text-center">
Login
</h2>

<form class="space-y-4" onsubmit="loginUser(event)">

<input 
type="email" 
id="email" 
placeholder="Verified Email"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3"
required>

<div class="relative">

<input 
type="password" 
id="password" 
placeholder="Password"
class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3"
required>

<button 
type="button" 
onclick="togglePassword('password')"
class="absolute right-3 top-3 text-slate-400">

<i id="password-icon" data-lucide="eye"></i>

</button>

</div>

<button 
type="submit"
class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">

Login

</button>

</form>

<div class="text-center mt-4">

<button 
onclick="forgotPassword()" 
class="text-cyan-400 text-sm">

Forgot Password?

</button>

</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a5cff,#8f7bff,#b7aaff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:35px;
border-radius:20px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:12px;
background:#6a5cff;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<button>Login</button>

</div>

</body>

</html>

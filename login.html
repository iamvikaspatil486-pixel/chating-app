<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Students Harate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>.step { display: none; } .step.active { display: block; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-2xl">
    <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-8 text-center">Login</h2>

    <div id="loginStep1" class="step active space-y-4">
        <input type="text" id="loginRollNo" placeholder="Enter Roll No." class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
        <button onclick="checkUser()" id="nextBtn" class="w-full py-4 bg-slate-700 rounded-2xl font-bold">Next</button>
    </div>

    <div id="loginStep2" class="step space-y-4">
        <div class="relative">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
            <button onclick="togglePass('loginPassword')" class="absolute right-4 top-3.5 text-slate-500"><i id="loginPassword-icon" data-lucide="eye"></i></button>
        </div>
        <button onclick="handleLogin(event)" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">Login</button>
        <div class="flex justify-between px-2"><button onclick="showStep('loginStep1')" class="text-xs text-slate-500 uppercase font-bold">Back</button><button onclick="showStep('forgotStep')" class="text-xs text-cyan-500 uppercase font-bold">Forgot Password?</button></div>
    </div>

    <div id="forgotStep" class="step space-y-4">
        <p class="text-slate-400 text-sm text-center">Enter your verified registration email.</p>
        <input type="email" id="resetEmail" placeholder="your@email.com" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
        <button id="sendOtpBtn" onclick="sendOtp()" class="w-full py-4 bg-slate-700 rounded-2xl font-bold text-cyan-400">Send OTP</button>
        <button onclick="showStep('loginStep2')" class="w-full text-center text-xs text-slate-500 uppercase font-bold">Cancel</button>
    </div>

    <div id="otpStep" class="step space-y-4">
        <p class="text-slate-400 text-sm text-center">Enter the 6-digit code sent to your email.</p>
        <input type="text" id="otpCode" placeholder="000000" maxlength="6" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-center text-2xl tracking-widest outline-none focus:border-cyan-500">
        <button id="verifyOtpBtn" onclick="verifyOtp()" class="w-full py-4 bg-cyan-600 rounded-2xl font-bold">Verify Code</button>
    </div>

    <div id="newPassStep" class="step space-y-4">
        <input type="password" id="finalNewPass" placeholder="Set New Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
        <button onclick="updatePassword()" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">Update & Login</button>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>

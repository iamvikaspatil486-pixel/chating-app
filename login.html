<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Harate Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="login.js" defer></script>

<style>
.step { display: none; }
.step.active { display: block; }
</style>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md">
<h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 text-center">
Students Harate
</h2>

<form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">

<div id="step1" class="step active space-y-4">
    <input type="text" id="identity" placeholder="Name or Roll No."
    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
    <button type="button" onclick="nextStep('step1','step2')"
    class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">Next</button>
    <p onclick="showForgot()" class="text-cyan-400 text-center text-sm cursor-pointer mt-2">Forgot Password?</p>
</div>

<div id="step2" class="step space-y-4">
    <div class="relative">
        <input type="password" id="password" placeholder="Password"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
        <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3 text-slate-400">
            <i id="password-icon" data-lucide="eye"></i>
        </button>
    </div>
    <div class="flex gap-4">
        <button type="button" onclick="prevStep('step2','step1')"
        class="flex-1 py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">Back</button>
        <button type="submit" id="loginBtn"
        class="flex-[2] py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-bold">Login</button>
    </div>
</div>

<div id="forgotStep" class="step space-y-4">
    <input type="email" id="resetEmail" placeholder="Enter your verified Email"
    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3" required>
    <button type="button" onclick="sendReset()" class="w-full py-4 bg-cyan-600 rounded-2xl font-bold">Send Verification</button>
    <button type="button" onclick="backToLogin()" class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl font-bold">Back to Login</button>
</div>

</form>
</div>

<script>
lucide.createIcons();
</script>
</body>
</html>

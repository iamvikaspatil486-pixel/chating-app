<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Create Post | Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  
</head>

<body class="bg-slate-900 text-white font-sans overflow-x-hidden">

<header class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 text-center">
<h1 class="text-xl font-bold text-cyan-400">ADD POST</h1>
</header>


<main class="max-w-md mx-auto p-4 space-y-6 pb-24">

<div>
<label class="text-sm text-slate-400">Upload Images</label>

<input 
type="file" 
id="images" 
multiple 
accept="image/*"
class="w-full mt-2 p-3 bg-slate-800 rounded-xl">
</div>


<div id="preview" class="flex gap-2 overflow-x-auto"></div>


<div>
<label class="text-sm text-slate-400">Caption</label>

<textarea 
id="caption" 
rows="3"
placeholder="Write something..."
class="w-full mt-2 p-3 bg-slate-800 rounded-xl"></textarea>
</div>


<button 
id="postBtn"
type="button"
class="w-full py-3 bg-cyan-500 rounded-xl font-bold text-slate-900 hover:bg-cyan-400 active:bg-cyan-600 transition">
Post
</button>

</main>



<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-4">

<button onclick="window.location.href='home.html'">
<i data-lucide="home"></i>
</button>

<button class="text-cyan-400">
<i data-lucide="plus"></i>
</button>

<button onclick="window.location.href='chat.html'">
<i data-lucide="message-square"></i>
</button>

</nav>



<script>

lucide.createIcons()

document.addEventListener("DOMContentLoaded", () => {

const imagesInput = document.getElementById("images")
const preview = document.getElementById("preview")
const postBtn = document.getElementById("postBtn")


// IMAGE PREVIEW
imagesInput.addEventListener("change", function(){

preview.innerHTML=""

const files=this.files

for(let i=0;i<files.length;i++){

const img=document.createElement("img")

img.src=URL.createObjectURL(files[i])

img.className="w-24 h-24 object-cover rounded-lg"

preview.appendChild(img)

}

})




// POST BUTTON CLICK
postBtn.addEventListener("click", async () => {

const caption=document.getElementById("caption").value.trim()
const files=imagesInput.files

if(!files.length){
alert("Select at least one image")
return
}

if(!caption){
alert("Caption required")
return
}

if(!window.db){
alert("Database not initialized")
return
}


// ── GET BATCH ID FROM LOCALSTORAGE ──────────────────────
const batchStr = localStorage.getItem('selectedBatch')
const batch = batchStr ? JSON.parse(batchStr) : null
const batchId = batch?.batchId

console.log('Batch Info:', { batchStr, batch, batchId })

if (!batchId) {
  alert("Batch not found. Please login again.")
  window.location.href = 'login.html'
  return
}


// GET USER
const { data:{ session } } = await db.auth.getSession()

if(!session){
alert("Please login first")
window.location.href = 'login.html'
return
}

const user=session.user

console.log('Current User ID:', user.id)



// GET USER NAME FROM STUDENTS TABLE
const { data: student, error: studentError } =
await db
.from("students")
.select("nickname, full_name")
.eq("id", user.id)
.single()


if(studentError){

console.log("Student fetch error:", studentError)

alert("Could not fetch user profile")

return

}

const nickname = student.nickname
const full_name = student.full_name

console.log('Student Info:', { nickname, full_name })



// CREATE POST WITH CORRECT COLUMNS ✅
// posts table has: id, user_id, caption, batch_id, nickname, full_name, created_at
const { data:post, error } = await db
.from("posts")
.insert({
  user_id: user.id,           // ✅ User who created post
  caption: caption,            // ✅ Post caption
  nickname: nickname,          // ✅ User's nickname
  full_name: full_name,        // ✅ User's full name
  batch_id: batchId            // ✅ Which batch created it
})
.select()
.single()


if(error){

console.log("Post creation error:", error)

alert("Post creation failed: " + (error.message || "Unknown error"))

return

}

console.log('Post created:', post)



// UPLOAD IMAGES
let uploadedCount = 0

for(let i=0;i<files.length;i++){

const file=files[i]

const fileName=`${post.id}_${Date.now()}_${i}_${file.name}`

console.log('Uploading image:', fileName)

const { error:uploadError } =
await db.storage
.from("post-images")
.upload(fileName, file)


if(uploadError){

console.log("Upload error:", uploadError)

continue

}

uploadedCount++

const { data } =
db.storage
.from("post-images")
.getPublicUrl(fileName)


const imageUrl = data.publicUrl

console.log('Image URL:', imageUrl)



const { error:insertError } =
await db.from("post_images").insert({

post_id: post.id,

image_url: imageUrl,

position: i

})


if(insertError){

console.log("Insert post_image failed:", insertError)

}

}

console.log(`Uploaded ${uploadedCount} out of ${files.length} images`)

alert("Post created successfully!")

window.location.href="home.html"

})

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notice | Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="fcm.js"></script>

</head>

<body class="bg-slate-950 text-white font-sans overflow-x-hidden">

<!-- HEADER -->
<header class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 flex items-center justify-between z-50">

  <button onclick="history.back()" class="text-cyan-400 font-bold">← Back</button>

  <h1 class="text-xl font-bold text-cyan-400">Notice Board</h1>

  <!-- 3 dots menu -->
  <div class="relative">
    <button id="menuBtn" class="text-cyan-400 font-bold text-2xl px-2">⋮</button>
    <div id="dropMenu" class="hidden absolute right-0 top-10 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl z-50 min-w-max">
      <button id="writeNoticeBtn" class="block w-full text-left px-5 py-3 text-sm text-white hover:bg-slate-700 rounded-xl">
        ✏️ Write Notice
      </button>
    </div>
  </div>

</header>

<!-- WRITE NOTICE MODAL -->
<div id="writeModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center px-4">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-6">
    <h2 class="text-cyan-400 font-bold text-lg mb-4">Write Notice</h2>

    <input id="noticeTitle" type="text" placeholder="Title"
      class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-cyan-500 mb-3">

    <textarea id="noticeContent" placeholder="Write your notice here..." rows="4"
      class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-cyan-500 mb-4 resize-none"></textarea>

    <div class="flex gap-3">
      <button onclick="submitNotice()"
        class="flex-1 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-xl font-bold text-sm">
        Post Notice
      </button>
      <button onclick="closeWriteModal()"
        class="px-4 py-3 bg-slate-700 rounded-xl font-bold text-sm text-slate-300">
        Cancel
      </button>
    </div>
  </div>
</div>

<!-- NOTICES FEED -->
<main id="noticeFeed" class="max-w-md mx-auto px-3 pt-4 pb-28 space-y-4">
  <p id="loadingText" class="text-slate-500 text-sm text-center mt-8">Loading notices...</p>
</main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3">

  <button onclick="window.location.href='home.html'">
    <i data-lucide="home" class="text-slate-400"></i>
  </button>

  <button onclick="window.location.href='create.html'"
    class="bg-cyan-500 p-3 rounded-full text-slate-900">
    <i data-lucide="plus"></i>
  </button>

  <button onclick="window.location.href='username.html'">
    <i data-lucide="message-square" class="text-slate-400"></i>
  </button>

</nav>

<script>

const ADMIN_PASSWORD = "9353vik"
let isAdmin = false

// ── Lucide icons ──
function initLucide() {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons()
  } else {
    setTimeout(initLucide, 50)
  }
}
initLucide()

// ── 3 dots menu toggle ──
document.getElementById('menuBtn').addEventListener('click', function(e) {
  e.stopPropagation()
  document.getElementById('dropMenu').classList.toggle('hidden')
})

document.addEventListener('click', function() {
  document.getElementById('dropMenu').classList.add('hidden')
})

// ── Write Notice button ──
document.getElementById('writeNoticeBtn').addEventListener('click', function() {
  document.getElementById('dropMenu').classList.add('hidden')

  if (!isAdmin) {
    const pass = prompt("Enter admin password:")
    if (pass === ADMIN_PASSWORD) {
      isAdmin = true
      openWriteModal()
    } else {
      alert("❌ Wrong password")
    }
    return
  }

  openWriteModal()
})

function openWriteModal() {
  document.getElementById('writeModal').classList.remove('hidden')
}

function closeWriteModal() {
  document.getElementById('writeModal').classList.add('hidden')
  document.getElementById('noticeTitle').value = ''
  document.getElementById('noticeContent').value = ''
}

// ── Submit Notice ──
async function submitNotice() {
  const title = document.getElementById('noticeTitle').value.trim()
  const content = document.getElementById('noticeContent').value.trim()

  if (!title || !content) {
    alert("Please fill in both title and content")
    return
  }

  const { data: { user } } = await db.auth.getUser()

  const { error } = await db.from('notices').insert({
    title,
    content,
    created_by: user?.id || 'admin'
  })

  if (error) {
    alert("Failed to post notice: " + error.message)
    return
  }

  closeWriteModal()
  loadNotices()
}

// ── Delete Notice ──
async function deleteNotice(id) {
  if (!confirm("Delete this notice?")) return

  const { error } = await db.from('notices').delete().eq('id', id)

  if (error) {
    alert("Delete failed: " + error.message)
    return
  }

  const el = document.querySelector(`[data-notice-id="${id}"]`)
  if (el) el.remove()
}

// ── Load Notices ──
async function loadNotices() {
  const feed = document.getElementById('noticeFeed')
  document.getElementById('loadingText').style.display = 'block'

  const { data, error } = await db
    .from('notices')
    .select('*')
    .order('created_at', { ascending: false })

  document.getElementById('loadingText').style.display = 'none'

  if (error) {
    feed.innerHTML = `<p class="text-red-400 text-sm text-center">Error loading notices</p>`
    return
  }

  if (!data || data.length === 0) {
    feed.innerHTML = `<p class="text-slate-500 text-sm text-center mt-8">No notices yet</p>`
    return
  }

  // Clear old notices
  feed.innerHTML = ''

  data.forEach(notice => {
    const date = new Date(notice.created_at).toLocaleDateString('en-IN', {
      day: 'numeric',
      month: 'short',
      year: 'numeric'
    })

    const card = document.createElement('div')
    card.className = 'bg-slate-800 border border-slate-700 rounded-2xl p-4'
    card.dataset.noticeId = notice.id

    card.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-2">
        <h2 class="text-white font-bold text-base leading-tight flex-1">${notice.title}</h2>
        ${isAdmin ? `
          <button onclick="deleteNotice('${notice.id}')"
            class="text-red-400 text-xs flex-shrink-0 mt-0.5">
            <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
          </button>
        ` : ''}
      </div>
      <p class="text-slate-300 text-sm leading-relaxed mb-3">${notice.content}</p>
      <p class="text-slate-500 text-xs">${date}</p>
    `

    feed.appendChild(card)
  })

  lucide.createIcons()
}

// ── Realtime ──
db.channel('notices-live')
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'notices' },
    () => loadNotices()
  )
  .on('postgres_changes',
    { event: 'DELETE', schema: 'public', table: 'notices' },
    () => loadNotices()
  )
  .subscribe()

// ── Init ──
loadNotices()

</script>
<script src="sessionCheck.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</head>

<body class="bg-slate-900 text-white font-sans overflow-x-hidden">

<!-- HEADER -->
<header class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 text-center">
<h1 class="text-xl font-bold text-cyan-400">STUDENTS HARATE</h1>
<p class="text-xs text-slate-400">NOTICE</p>
</header>


<!-- FEED -->
<main id="feed"
class="max-w-md mx-auto p-4 space-y-6 pb-24">

<div id="noPosts"
class="text-center text-slate-500 text-sm">

No posts yet

</div>

</main>


<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3">

<!-- NOTICE -->
<button onclick="window.location.href='notice.html'">
<i data-lucide="megaphone"></i>
</button>

<!-- HOME -->
<button>
<i data-lucide="home"></i>
</button>

<!-- ADD POST -->
<button onclick="window.location.href='create.html'"
class="bg-cyan-500 p-3 rounded-full text-slate-900">

<i data-lucide="plus"></i>

</button>

<!-- CHAT -->
<button onclick="window.location.href='chat.html'">
<i data-lucide="message-square"></i>
</button>

</nav>


<script src="home.js"></script>

<script>
lucide.createIcons()
</script>

</body>
</html>

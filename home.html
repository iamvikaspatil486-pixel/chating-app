<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

</head>

<body class="bg-slate-950 text-white font-sans overflow-x-hidden">

<!-- HEADER -->
<header class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 flex items-center z-50">

<button onclick="window.location.href='notice.html'"
class="text-cyan-400 font-bold mr-4">
Notice
</button>

<div class="text-center w-full">
<h1 class="text-xl font-bold text-cyan-400">
STUDENTS HARATE
</h1>
</div>

</header>

<!-- FEED -->
<main id="feed" class="max-w-md mx-auto px-3 pt-3 pb-28 space-y-4">

<div id="noPosts" class="text-center text-slate-500 text-sm mt-8">
No posts yet
</div>

</main>


<!-- POST TEMPLATE -->
<template id="postTemplate">

<div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden">

<!-- USER HEADER -->
<div class="flex items-center justify-between p-3">

<div class="flex items-center gap-2">

<div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-xs font-bold">
U
</div>

<div class="text-sm font-semibold postUser">
User
</div>

</div>

<button class="deleteBtn text-red-400">
<i data-lucide="trash-2"></i>
</button>

</div>

<!-- IMAGE -->
<div class="postImages"></div>

<!-- ACTION BAR -->
<div class="flex items-center justify-between px-3 mt-2">

<div class="flex gap-5">

<button class="likeBtn flex items-center gap-1">
<i data-lucide="heart"></i>
<span class="likeCount text-sm">0</span>
</button>

<button class="commentBtn flex items-center gap-1">
<i data-lucide="message-circle"></i>
<span class="commentCount text-sm">0</span>
</button>

</div>

</div>

<!-- CAPTION -->
<div class="px-3 mt-2 text-sm pb-3">

<span class="font-semibold postUser">User</span>
<span class="postCaption text-slate-300"></span>

</div>

</div>

</template>


<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3">

<button>
<i data-lucide="home"></i>
</button>

<button onclick="window.location.href='create.html'"
class="bg-cyan-500 p-3 rounded-full text-slate-900">
<i data-lucide="plus"></i>
</button>

<button onclick="window.location.href='username.html'">
<i data-lucide="message-square"></i>
</button>

</nav>


<script src="home.js"></script>

<script>
lucide.createIcons()
</script>

</body>
</html>

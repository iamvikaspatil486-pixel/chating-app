<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Students Harate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

</head>

<body class="bg-slate-950 text-white font-sans overflow-x-hidden">

<!-- HEADER -->
<header class="sticky top-0 bg-slate-900 border-b border-slate-800 p-4 flex items-center z-50">

  <button onclick="window.location.href='notice.html'"
    class="text-cyan-400 font-bold mr-4">
    Notice
  </button>

  <div class="text-center w-full">
    <h1 class="text-xl font-bold text-cyan-400">
      STUDENTS HARATE
    </h1>
  </div>

  <button onclick="openStudents()"
    class="text-cyan-400 font-bold ml-4">
    Students
  </button>

</header>

<!-- STUDENTS MODAL -->
<div id="studentsModal"
  class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center px-4">

  <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm max-h-[70vh] flex flex-col">

    <!-- Modal Header -->
    <div class="flex items-center justify-between p-4 border-b border-slate-700">
      <h2 class="text-cyan-400 font-bold text-lg">Students</h2>
      <button onclick="closeStudents()" class="text-slate-400 text-xl">✕</button>
    </div>

    <!-- Search -->
    <div class="px-4 pt-3">
      <input id="studentSearch" type="text" placeholder="Search students..."
        oninput="filterStudents()"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white outline-none placeholder-slate-500" />
    </div>

    <!-- Student List -->
    <div id="studentList"
      class="overflow-y-auto flex-1 p-4 space-y-2">
      <p class="text-slate-500 text-sm text-center">Loading...</p>
    </div>

  </div>

</div>

<!-- FEED -->
<main id="feed" class="max-w-md mx-auto px-3 pt-3 pb-28 space-y-4">

<div id="noPosts" class="text-center text-slate-500 text-sm mt-8">
No posts yet
</div>

</main>


<!-- POST TEMPLATE -->
<template id="postTemplate">

<div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden">

<!-- USER HEADER -->
<div class="flex items-center justify-between p-3">

<div class="flex items-center gap-2">

<div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-xs font-bold">
U
</div>

<div class="text-sm font-semibold postUser">
User
</div>

</div>

<button class="deleteBtn text-red-400">
<i data-lucide="trash-2"></i>
</button>

</div>

<!-- IMAGE -->
<div class="postImages"></div>

<!-- ACTION BAR -->
<div class="flex items-center justify-between px-3 mt-2">

<div class="flex gap-5">

<button class="likeBtn flex items-center gap-1">
<i data-lucide="heart"></i>
<span class="likeCount text-sm">0</span>
</button>

<button class="commentBtn flex items-center gap-1">
<i data-lucide="message-circle"></i>
<span class="commentCount text-sm">0</span>
</button>

</div>

</div>

<!-- CAPTION -->
<div class="px-3 mt-2 text-sm pb-3">

<span class="font-semibold postUser">User</span>
<span class="postCaption text-slate-300"></span>

</div>

</div>

</template>


<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3">

<button>
<i data-lucide="home"></i>
</button>

<button onclick="window.location.href='create.html'"
class="bg-cyan-500 p-3 rounded-full text-slate-900">
<i data-lucide="plus"></i>
</button>

<button onclick="window.location.href='username.html'">
<i data-lucide="message-square"></i>
</button>

</nav>


<script src="home.js"></script>

<script>
lucide.createIcons()
</script>
<script>
  let allStudents = [];

  async function openStudents() {
    document.getElementById('studentsModal').classList.remove('hidden');
    await loadStudents();
  }

  function closeStudents() {
    document.getElementById('studentsModal').classList.add('hidden');
    document.getElementById('studentSearch').value = '';
    filterStudents();
  }

  async function loadStudents() {
    const list = document.getElementById('studentList');
    list.innerHTML = '<p class="text-slate-500 text-sm text-center">Loading...</p>';

    const { data, error } = await db
      .from('students')
      .select('full_name, roll_no, is_approved')
      .order('full_name');

    if (error) {
      list.innerHTML = `<p class="text-red-400 text-sm text-center">Error: ${error.message}</p>`;
      return;
    }

    if (!data || data.length === 0) {
      list.innerHTML = '<p class="text-slate-500 text-sm text-center">No data returned</p>';
      return;
    }

    allStudents = data;
    renderStudents(allStudents);
  }
  
function renderStudents(students) {
    const list = document.getElementById('studentList');

    if (students.length === 0) {
      list.innerHTML = '<p class="text-slate-500 text-sm text-center">No students found</p>';
      return;
    }

    list.innerHTML = students.map(s => `
      <div class="flex items-center gap-3 bg-slate-800 rounded-xl px-3 py-2">
        <div class="w-9 h-9 rounded-full bg-cyan-500 flex items-center justify-center text-sm font-bold flex-shrink-0">
          ${s.full_name ? s.full_name[0].toUpperCase() : 'S'}
        </div>
        <div class="flex-1">
          <div class="text-sm font-semibold">${s.full_name || 'Unknown'}</div>
          <div class="text-xs text-slate-400">${s.roll_no || 'No roll no'}</div>
        </div>
        <div class="text-xs font-semibold px-2 py-1 rounded-full ${s.is_approved === 'true' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
          ${s.is_approved === 'true' ? '✓ Approved' : 'Not Approved Yet'}
        </div>
      </div>
    `).join('');
  }

  function filterStudents() {
    const q = document.getElementById('studentSearch').value.toLowerCase();
    const filtered = allStudents.filter(s =>
      (s.username || '').toLowerCase().includes(q)
    );
    renderStudents(filtered);
  }

  // Close modal on backdrop click
  document.getElementById('studentsModal').addEventListener('click', function(e) {
    if (e.target === this) closeStudents();
  });
</script>

</body>
</html>

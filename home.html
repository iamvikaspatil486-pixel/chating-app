<style>
  /* Notification Popup Animation */
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes slideDown {
    from { transform: translateY(0);    opacity: 1; }
    to   { transform: translateY(100%); opacity: 0; }
  }
  #notifPopup {
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  #notifPopup.hiding {
    animation: slideDown 0.25s ease-in forwards;
  }

  /* Bell ring animation */
  @keyframes bellRing {
    0%,100% { transform: rotate(0deg); }
    15%      { transform: rotate(20deg); }
    30%      { transform: rotate(-18deg); }
    45%      { transform: rotate(14deg); }
    60%      { transform: rotate(-10deg); }
    75%      { transform: rotate(6deg); }
  }
  .bell-ring {
    display: inline-block;
    animation: bellRing 1.2s ease infinite;
    transform-origin: top center;
  }
</style>

<body class="bg-slate-950 text-white font-sans overflow-x-hidden">

<!-- ═══════════════════════════════════════
     NOTIFICATION PERMISSION POPUP
     Shown once per session unless already granted/denied
     ═══════════════════════════════════════ -->
<div id="notifPopup"
  class="fixed bottom-20 left-3 right-3 z-[100] max-w-md mx-auto hidden">

  <div class="bg-slate-800 border border-slate-600 rounded-2xl p-4 shadow-2xl shadow-black/60">

    <!-- Top row: icon + title + close -->
    <div class="flex items-start gap-3">

      <!-- Bell icon with ring animation -->
      <div class="w-11 h-11 rounded-xl bg-cyan-500/20 border border-cyan-500/30
                  flex items-center justify-center flex-shrink-0">
        <span class="bell-ring text-cyan-400 text-xl">🔔</span>
      </div>

      <!-- Text -->
      <div class="flex-1">
        <p class="text-sm font-bold text-white leading-tight">
          Stay in the loop!
        </p>
        <p class="text-xs text-slate-400 mt-0.5 leading-relaxed">
          Get notified when batchmates start chatting — never miss a moment.
        </p>
      </div>

      <!-- Close (X) -->
      <button id="notifDismiss"
        class="text-slate-500 hover:text-slate-300 transition-colors mt-0.5 text-lg leading-none">
        ✕
      </button>

    </div>

    <!-- Action buttons -->
    <div class="flex gap-2 mt-3">

      <button id="notifAllow"
        class="flex-1 bg-cyan-500 hover:bg-cyan-400 active:bg-cyan-600
               text-slate-900 font-bold text-sm rounded-xl py-2.5
               transition-colors flex items-center justify-center gap-1.5">
        <span>Allow Notifications</span>
      </button>

      <button id="notifDecline"
        class="px-4 bg-slate-700 hover:bg-slate-600 active:bg-slate-800
               text-slate-300 font-semibold text-sm rounded-xl py-2.5
               transition-colors">
        Not now
      </button>

    </div>

  </div>
</div>
<!-- ═══ END NOTIFICATION POPUP ═══ -->

<script>
// ==========================================
// STUDENTS MODAL LOGIC
// ==========================================

let allStudents = [];
let currentProfileId = null;

// ── LOAD MY PROFILE ──────────────────────────────────────
async function loadMyProfile() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return;

  const { data } = await db
    .from('students')
    .select('full_name, roll_no, nickname')
    .eq('id', user.id)
    .single();

  if (!data) return;

  const initial = data.full_name ? data.full_name[0].toUpperCase() : '?';
  document.getElementById('myAvatar').textContent = initial;
  document.getElementById('myName').textContent = data.full_name || 'Unknown';
  document.getElementById('myRoll').textContent = data.roll_no || '';
  document.getElementById('myNickname').textContent = data.nickname ? `"${data.nickname}"` : 'Tap Edit to add nickname';
  document.getElementById('nicknameInput').value = data.nickname || '';
  currentProfileId = user.id;
}

// ── OPEN / CLOSE STUDENTS MODAL ──────────────────────────
async function openStudents() {
  document.getElementById('studentsModal').classList.remove('hidden');
  loadMyProfile();
  await loadStudents();
}

function closeStudents() {
  document.getElementById('studentsModal').classList.add('hidden');
  document.getElementById('studentSearch').value = '';
  filterStudents();
}

// ── LOAD STUDENTS LIST ───────────────────────────────────
async function loadStudents() {
  const list = document.getElementById('studentList');
  list.innerHTML = '<p class="text-slate-500 text-sm text-center">Loading...</p>';

  const { data, error } = await db
    .from('students')
    .select('id, full_name, roll_no, is_approved, nickname')
    .order('full_name');

  if (error) {
    list.innerHTML = `<p class="text-red-400 text-sm text-center">Error: ${error.message}</p>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = '<p class="text-slate-500 text-sm text-center">No students found</p>';
    return;
  }

  allStudents = data;
  renderStudents(allStudents);
}

// ── RENDER STUDENTS ──────────────────────────────────────
function renderStudents(students) {
  const list = document.getElementById('studentList');

  if (students.length === 0) {
    list.innerHTML = '<p class="text-slate-500 text-sm text-center">No students found</p>';
    return;
  }

  list.innerHTML = students.map(s => `
    <div onclick="openProfileModal(${JSON.stringify(s).replace(/"/g, '&quot;')})"
      class="flex items-center gap-3 bg-slate-800 hover:bg-slate-750 active:bg-slate-700 rounded-xl px-3 py-2 cursor-pointer transition-colors">

      <!-- Avatar -->
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
        ${s.full_name ? s.full_name[0].toUpperCase() : 'S'}
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold text-white truncate">${s.full_name || 'Unknown'}</div>
        <div class="text-xs text-slate-400 truncate">
          ${s.nickname ? `"${s.nickname}" · ` : ''}${s.roll_no || 'No roll no'}
        </div>
      </div>

      <!-- Status badge -->
      <div class="text-xs font-semibold px-2 py-1 rounded-full flex-shrink-0 whitespace-nowrap ${s.is_approved === true ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
        ${s.is_approved === true ? 'Approved' : 'Not approved yet'}
      </div>

    </div>
  `).join('');
}

// ── FILTER STUDENTS ──────────────────────────────────────
function filterStudents() {
  const q = document.getElementById('studentSearch').value.toLowerCase();
  const filtered = allStudents.filter(s =>
    (s.full_name || '').toLowerCase().includes(q) ||
    (s.roll_no || '').toLowerCase().includes(q) ||
    (s.nickname || '').toLowerCase().includes(q)
  );
  renderStudents(filtered);
}

// ── PROFILE DETAIL MODAL ─────────────────────────────────
function openProfileModal(student) {
  const initial = student.full_name ? student.full_name[0].toUpperCase() : '?';
  document.getElementById('profileAvatar').textContent = initial;
  document.getElementById('profileName').textContent = student.full_name || 'Unknown';
  document.getElementById('profileNickname').textContent = student.nickname ? `"${student.nickname}"` : '';
  document.getElementById('profileRoll').textContent = student.roll_no ? `Roll No: ${student.roll_no}` : '';

  const statusEl = document.getElementById('profileStatus');
  if (student.is_approved === true) {
    statusEl.textContent = '✓ Approved Student';
    statusEl.className = 'text-xs px-3 py-1 rounded-full font-semibold bg-green-500/20 text-green-400';
  } else {
    statusEl.textContent = '⏳ Pending Approval';
    statusEl.className = 'text-xs px-3 py-1 rounded-full font-semibold bg-red-500/20 text-red-400';
  }

  document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.add('hidden');
}

// ── EDIT MY PROFILE ──────────────────────────────────────
function openMyProfile() {
  document.getElementById('editProfileModal').classList.remove('hidden');
}

function closeEditProfile() {
  document.getElementById('editProfileModal').classList.add('hidden');
}

async function saveNickname() {
  const nickname = document.getElementById('nicknameInput').value.trim();
  if (!currentProfileId) return;

  const { error } = await db
    .from('students')
    .update({ nickname })
    .eq('id', currentProfileId);

  if (error) { alert('Failed to save'); return; }

  document.getElementById('myNickname').textContent = nickname ? `"${nickname}"` : 'Tap Edit to add nickname';
  closeEditProfile();

  // Refresh list to show updated nickname
  await loadStudents();
}

// ── CLOSE ON BACKDROP ────────────────────────────────────
document.getElementById('studentsModal').addEventListener('click', function(e) {
  if (e.target === this) closeStudents();
});

document.getElementById('profileModal').addEventListener('click', function(e) {
  if (e.target === this) closeProfileModal();
});

document.getElementById('editProfileModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditProfile();
});


// ==========================================
// HOME / FEED LOGIC
// ==========================================

const feed = document.getElementById("feed")
const noPosts = document.getElementById("noPosts")

document.addEventListener("DOMContentLoaded", () => {

    if (!window.db) {
        console.error("Supabase not initialized")
        noPosts.innerText = "Cannot load posts"
        return
    }

    loadPosts()
})


// LOAD POSTS
async function loadPosts() {

    feed.innerHTML = ""

    const { data: posts, error } = await db
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false })

    if (error) {
        console.error(error)
        noPosts.innerText = "Error loading posts"
        return
    }

    if (!posts || posts.length === 0) {
        noPosts.style.display = "block"
        return
    }

    noPosts.style.display = "none"

    for (const post of posts) {

        // GET POST IMAGES
        const { data: images } = await db
            .from("post_images")
            .select("*")
            .eq("post_id", post.id)
            .order("position")

        let imagesHtml = ""

        if (images && images.length > 0) {

            imagesHtml = `<div class="flex gap-2 overflow-x-auto p-3">`

            for (const img of images) {
                imagesHtml += `
                <img src="${img.image_url}"
                onclick="openImage('${img.image_url}')"
                class="w-36 h-36 object-cover rounded-lg flex-shrink-0">
                `
            }

            imagesHtml += `</div>`
        }


        // GET LIKES
        const { data: likes } = await db
            .from("likes")
            .select("*")
            .eq("post_id", post.id)

        const likeCount = likes ? likes.length : 0
        // Check if current user liked this post
        const { data: { session } } = await db.auth.getSession()
        const currentUserId = session?.user?.id
        const userLiked = likes && currentUserId
            ? likes.some(l => l.user_id === currentUserId)
            : false


        // GET COMMENTS COUNT
        const { data: comments } = await db
            .from("comments")
            .select("*")
            .eq("post_id", post.id)

        const commentCount = comments ? comments.length : 0


        // USER DISPLAY
        const nickname = post.nickname || ""
        const fullName = post.full_name || ""

        const displayName = nickname || fullName || "user"
        const letter = displayName.charAt(0).toUpperCase()


        const card = document.createElement("div")

        // divider line between posts
        card.className = "bg-slate-800 rounded-2xl overflow-hidden shadow border border-slate-700 mb-4"


        card.innerHTML = `

        <div class="flex items-center gap-3 p-3">

            <div class="w-10 h-10 rounded-full bg-cyan-500 flex items-center justify-center font-bold">
            ${letter}
            </div>

            <div>
                <p class="text-sm font-bold text-cyan-400">${displayName}</p>
                <p class="text-xs text-slate-400">${fullName}</p>
            </div>

        </div>

        ${imagesHtml}

        <div class="p-3 text-sm text-slate-200">
        ${post.caption || ""}
        </div>

        <div class="flex justify-between items-center p-3 border-t border-slate-700">

            <div class="flex gap-4 items-center">

                <button onclick="likePost('${post.id}')"
                class="text-slate-400 hover:text-red-400 flex items-center gap-1">

                <i data-lucide="heart" class="w-5 h-5"></i>

                <span id="likes-${post.id}" class="text-xs">${likeCount}</span>

                </button>

                <button onclick="openComments('${post.id}')"
                class="text-slate-400 hover:text-blue-400 flex items-center gap-1">

                <i data-lucide="message-circle" class="w-5 h-5"></i>

                <span class="text-xs">${commentCount}</span>

                </button>

            </div>

            <button onclick="deletePost('${post.id}','${post.user_id}')"
            class="text-red-400 hover:text-red-500">

            <i data-lucide="trash-2" class="w-5 h-5"></i>

            </button>

        </div>
        `

        feed.appendChild(card)

    }

    // RENDER ICONS
    lucide.createIcons()
}



// LIKE / UNLIKE
async function likePost(postId) {

    const { data: { session } } = await db.auth.getSession()

    if (!session) {
        alert("Login required")
        return
    }

    const user = session.user

    const { data: existing } = await db
        .from("likes")
        .select("*")
        .eq("post_id", postId)
        .eq("user_id", user.id)
        .maybeSingle()

    if (existing) {

        await db
        .from("likes")
        .delete()
        .eq("post_id", postId)
        .eq("user_id", user.id)

    } else {

        await db
        .from("likes")
        .insert({
            post_id: postId,
            user_id: user.id
        })

    }

    updateLikes(postId)
}



// UPDATE LIKE COUNT
async function updateLikes(postId) {

    const { data: { session } } = await db.auth.getSession()
    const currentUserId = session?.user?.id

    const { data } = await db
        .from("likes")
        .select("*")
        .eq("post_id", postId)

    const count = data ? data.length : 0
    const userLiked = data && currentUserId
        ? data.some(l => l.user_id === currentUserId)
        : false

    document.getElementById("likes-" + postId).innerText = count

    const heart = document.getElementById("heart-" + postId)
    if (heart) {
        heart.style.fill = userLiked ? "red" : "none"
        heart.style.color = userLiked ? "red" : "#94a3b8"
    }
}



// DELETE POST
async function deletePost(postId, ownerId) {

    const { data: { session } } = await db.auth.getSession()

    if (!session) {
        alert("Login required")
        return
    }

    const user = session.user

    if (user.id !== ownerId) {
        alert("You cannot delete this post")
        return
    }

    const confirmDelete = confirm("Are you sure you want to delete this post?")

    if (!confirmDelete) return

    await db.from("post_images").delete().eq("post_id", postId)

    await db
        .from("posts")
        .delete()
        .eq("id", postId)

    location.reload()
}



// OPEN COMMENTS PAGE
function openComments(postId) {

    window.location.href = "comments.html?post=" + postId

}



// OPEN IMAGE FULLSCREEN
function openImage(url) {

    const win = window.open()

    win.document.write(`
    <style>
    body{
    margin:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    }

    img{
    max-width:100%;
    max-height:100%;
    }
    </style>

    <img src="${url}">
    `)
}


// ==========================================
// NOTIFICATION PERMISSION LOGIC
// ==========================================

(function initNotificationPrompt() {
  const popup    = document.getElementById('notifPopup');
  const btnAllow   = document.getElementById('notifAllow');
  const btnDecline = document.getElementById('notifDecline');
  const btnDismiss = document.getElementById('notifDismiss');

  // ── helpers ──────────────────────────────────────────────
  function hidePopup() {
    popup.classList.add('hiding');
    popup.addEventListener('animationend', () => {
      popup.classList.add('hidden');
      popup.classList.remove('hiding');
    }, { once: true });
  }

  function showPopup() {
    popup.classList.remove('hidden');
  }

  // ── show toast feedback ──────────────────────────────────
  function showToast(msg, color = 'bg-slate-700') {
    const t = document.createElement('div');
    t.textContent = msg;
    t.className = `fixed bottom-24 left-1/2 -translate-x-1/2 ${color}
                   text-white text-xs font-semibold px-4 py-2 rounded-full
                   shadow-lg z-[200] opacity-0 transition-opacity duration-300`;
    document.body.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = '1'; });
    setTimeout(() => {
      t.style.opacity = '0';
      t.addEventListener('transitionend', () => t.remove());
    }, 2800);
  }

  // ── check if we should show at all ──────────────────────
  // Don't show if browser doesn't support notifications
  if (!('Notification' in window)) return;

  const ONE_DAY_MS = 24 * 60 * 60 * 1000;
  const savedChoice    = localStorage.getItem('notifChoice');
  const declinedAt     = localStorage.getItem('notifDeclinedAt');

  // Permanently granted — never show again
  if (savedChoice === 'granted') return;

  // Browser-level granted — save and skip
  if (Notification.permission === 'granted') {
    localStorage.setItem('notifChoice', 'granted');
    return;
  }

  // "Not now" declined by user — re-ask only after 1 day
  if (savedChoice === 'declined') {
    if (!declinedAt) return;
    const elapsed = Date.now() - parseInt(declinedAt, 10);
    if (elapsed < ONE_DAY_MS) return;
    localStorage.removeItem('notifChoice');
    localStorage.removeItem('notifDeclinedAt');
  }

  // Browser hard-denied (user clicked "Block" in the browser prompt) — don't nag
  if (Notification.permission === 'denied') return;

  // ── show popup after a short delay ───────────────────────
  setTimeout(showPopup, 1800);

  // ── ALLOW button ─────────────────────────────────────────
  btnAllow.addEventListener('click', function() {
    hidePopup();
    Notification.requestPermission().then(function(p) {
      if (p === 'granted') {
        localStorage.setItem('notifChoice', 'granted');
        showToast('🔔 Notifications enabled!', 'bg-cyan-600');
      } else {
        localStorage.setItem('notifChoice', 'declined');
        localStorage.setItem('notifDeclinedAt', Date.now().toString());
        showToast('Notifications blocked.', 'bg-slate-700');
      }
    });
  });
    
  // ── DECLINE / DISMISS buttons ─────────────────────────────
  function handleDecline() {
    localStorage.setItem('notifChoice', 'declined');
    localStorage.setItem('notifDeclinedAt', Date.now().toString());
    hidePopup();
    showToast("okay", 'bg-slate-700');
  }

  btnDecline.addEventListener('click', handleDecline);
  btnDismiss.addEventListener('click', handleDecline);

})();


// ==========================================
// PWA INSTALL LOGIC
// ==========================================

let deferredPrompt;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hidden');
});

document.getElementById('installBtn').addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(result) {
    if (result.outcome === 'accepted') {
      document.getElementById('installBanner').classList.add('hidden');
    }
    deferredPrompt = null;
  });
});

document.getElementById('installClose').addEventListener('click', function() {
  document.getElementById('installBanner').classList.add('hidden');
});

// Hide if already installed as PWA
if (window.matchMedia('(display-mode: standalone)').matches) {
  // Already installed, don't show banner
}


// ==========================================
// INITIALIZE LUCIDE ICONS
// ==========================================

function initLucide() {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  } else {
    setTimeout(initLucide, 50);
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLucide);
} else {
  initLucide();
}

</script>
